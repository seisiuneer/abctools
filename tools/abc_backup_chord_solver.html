  <script>
  /*
    ABC Tune Backup Chord Solver
    Michael Eskin-style standalone ABC batch utility.

    Database options:
      1) Put abctunes_thesession_28may2026.json in the same folder as this file.
      2) Or statically include the JSON before this script as:
           <script>window.abctunes_thesession_28may2026 = [...];<\/script>

    This tool does not infer harmony from melody. It only transfers chord symbols
    from already-chorded matching tunes in the supplied database.
  */

  var gDatabase = null;
  var gChordIndex = null;
  var gSaveFilename = "abc_backup_chords.abc";
  var gLastStats = null;
  var gCancelRequested = false;
  var gInputInitialized = false;
  var gProcessingControlsEnabled = true;
  var gOutputShareURL = "";
  var gDefaultInputABC = "X: 1\nT: Cooley's\nC: Traditional\nR: Reel\nM: 4/4\nL: 1/8\nQ: 1/2=90\nK: Edor\n|:EBBA B2 EB|B2 AB dBAG|F/E/D AD BDAD|F/E/D AD BAGF|\nEBBA B2 EB|B2 AB defg|afge dBAF|1 DEFD E3D:|2 DEFD E2gf||\n|:eB (3BBB eBgf|eBB2 gedB|A/A/A FA DAFA|A/A/A FA defg|\neB (3BBB eBgf|eBBB defg|afge dBAF|1 DEFD E2gf:|2 DEFD E4|]\n\nX: 1\nT: The Kesh\nC: Traditional\nR: Jig\nM: 6/8\nL: 1/8\nQ: 3/8=120\nK: Gmaj\n|:GAG GAB|ABA ABd|edd gdd|edB dBA|\nGAG GAB|ABA ABd|edd gdB|AGF G3:|\n|:BAB dBd|ege dBA|BAB dBG|ABA AGA|\nBAB dBd|ege dBd|gfg aga|bgf g3:|";


  var NOTE_RE = /(?:\^\^|__|\^|_|=)?[A-Ga-g][,']*(?:\d+\/\d+|\d+\/|\/\d+|\d+|\/)?/y;

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, function(c) {
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
    });
  }

  function setStatus(msg) {
    document.getElementById("status").innerHTML = msg;
  }

  function updateOutputActionButtons(outputText) {
    var hasOutput = !!(outputText && outputText.length);

    var copyButton = document.getElementById("copybutton");
    if (copyButton) {
      copyButton.disabled = !hasOutput;
      copyButton.title = hasOutput ? "Copy the generated output to the Clipboard" : "Generate output before copying";
    }

    var saveButton = document.getElementById("savebutton");
    if (saveButton) {
      saveButton.disabled = !hasOutput;
      saveButton.title = hasOutput ? "Save the generated output to a file" : "Generate output before saving";
    }
  }

  function clearOutputArea() {
    var output = document.getElementById("output");
    if (output) output.value = "";

    var copyButton = document.getElementById("copybutton");
    if (copyButton) copyButton.innerHTML = "Copy Output to the Clipboard";

    updateOutputActionButtons("");
    updateShareLinkForOutput("");
  }


  function buildABCTranscriptionToolsShareURL(abcText) {
    if (!abcText || !abcText.length) return "";

    var shareName = "ABC_Backup_Chord_Solver_Test";
    var abcInDeflate = compressABCDeflateForShareLink(abcText);

    var params = new URLSearchParams();
    params.set("def", abcInDeflate);
    params.set("format", "noten");
    params.set("name", shareName);
    params.set("editor", "1");

    return "https://michaeleskin.com/abctools/abctools.html?" + params.toString();
  }

  function compressABCDeflateForShareLink(abcText) {
    if (typeof pako === "undefined") {
      throw new Error("pako is not loaded. Include pako.min.js before using share links.");
    }
    if (typeof TextEncoder === "undefined") {
      throw new Error("TextEncoder is not available in this browser.");
    }

    var utf8Bytes = new TextEncoder().encode(abcText || "");
    var deflatedBytes = pako.deflate(utf8Bytes, { level: 6 });
    return bytesToBase64URL(deflatedBytes);
  }

  function bytesToBase64(bytes) {
    var binary = "";
    for (var i = 0; i < bytes.length; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
  }

  function bytesToBase64URL(bytes) {
    return bytesToBase64(bytes)
      .replace(/\+/g, "-")
      .replace(/\//g, "_")
      .replace(/=+$/, "");
  }

  function updateShareLinkForOutput(outputText) {
    var testButton = document.getElementById("testbutton");
    gOutputShareURL = "";

    if (!testButton) return;

    if (!outputText || !outputText.length) {
      testButton.disabled = true;
      testButton.title = "Generate output before testing it in the ABC Transcription Tools";
      return;
    }

    var url = buildABCTranscriptionToolsShareURL(outputText);
    if (url.length < 8100) {
      gOutputShareURL = url;
      testButton.disabled = false;
      testButton.title = "Open the generated output in the ABC Transcription Tools";
    } else {
      testButton.disabled = true;
      testButton.title = "Output is too long to test directly in the ABC Transcription Tools. Please save or copy the output instead.";
    }
  }

  function setOutputArea(outputText) {
    outputText = outputText || "";
    var output = document.getElementById("output");
    if (output) output.value = outputText;
    updateOutputActionButtons(outputText);
    updateShareLinkForOutput(outputText);
  }

  function setOutputAreaDuringProcessing(outputText) {
    // During a long batch run, keep the partial output visible, but avoid
    // recalculating the share link or changing output-button enabled states.
    // Those actions are only needed once, after processing completes or is
    // cancelled, and skipping them keeps large batches more responsive.
    var output = document.getElementById("output");
    if (output) output.value = outputText || "";
  }

  function handleInputChanged() {
    updateGenerateButtonState();

    if (!gInputInitialized) return;

    clearOutputArea();

    var input = document.getElementById("input");
    if (input && input.value && input.value.trim().length) {
      setStatus("Input changed. Click Generate Backup Chords to create new output.");
    } else {
      setStatus("Input cleared. Enter or open ABC notation to enable Generate Backup Chords.");
    }
  }

  function showProgressModal(message) {
    var overlay = document.getElementById("progress_modal_overlay");
    var status = document.getElementById("progress_modal_status");
    if (!overlay || !status) return;
    status.innerHTML = message || "Starting...";
    overlay.style.display = "block";
  }

  function updateProgressModal(message) {
    var status = document.getElementById("progress_modal_status");
    if (status) status.innerHTML = message;
  }

  function hideProgressModal() {
    var overlay = document.getElementById("progress_modal_overlay");
    if (overlay) overlay.style.display = "none";
  }

  function cancelProcessing() {
    gCancelRequested = true;
    clearOutputArea();
    updateProgressModal("Cancelling... Output has been cleared.");
    setStatus("Cancelling measure matching...");
  }

  function throwIfCancelled() {
    if (gCancelRequested) throw new Error("USER_CANCELLED");
  }

  function allowBrowserToUpdate() {
    return new Promise(function(resolve) {
      setTimeout(resolve, 0);
    });
  }

  function formatElapsed(ms) {
    var seconds = Math.max(0, Math.round(ms / 1000));
    var minutes = Math.floor(seconds / 60);
    seconds = seconds % 60;
    if (minutes > 0) return minutes + "m " + seconds + "s";
    return seconds + "s";
  }

  function updateGenerateButtonState() {
    var btn = document.getElementById("generatebutton");
    if (!btn) return;

    var input = document.getElementById("input");
    var hasInput = !!(input && input.value && input.value.trim().length);

    btn.disabled = !gProcessingControlsEnabled || !hasInput;
    btn.title = hasInput ? "Generate suggested backup chords for the input ABC notation" : "Enter or open ABC notation before generating backup chords";
  }

  function setProcessingControlsEnabled(enabled) {
    gProcessingControlsEnabled = !!enabled;

    updateGenerateButtonState();

    var input = document.getElementById("selectabcfile");
    if (input) input.disabled = !enabled;
    var clearButton = document.getElementById("clearbutton");
    if (clearButton) clearButton.disabled = !enabled;
  }

  function initializeTool() {
    gCancelRequested = false;
    hideProgressModal();

    var input = document.getElementById("input");
    if (input) input.value = gDefaultInputABC;

    clearOutputArea();

    var threshold = document.getElementById("threshold");
    if (threshold) threshold.value = "0.70";


    var fileInput = document.getElementById("selectabcfile");
    if (fileInput) {
      fileInput.value = "";
      configureFileOpenAccept();
    }

    gSaveFilename = "abc_backup_chords.abc";
    setProcessingControlsEnabled(true);
    setStatus("Ready.");
  }

  function showMessageDialog(message) {
    if (window.DayPilot && DayPilot.Modal) {
      DayPilot.Modal.alert(message, {
        theme: "modal_flat",
        width: 420,
        top: 150,
        scrollWithPage: true
      });

      alert(message.replace(/<[^>]*>/g, ""));
    }

  function showInstructions() {
    var html = '' +
      '<div class="instructions_content">' +
      '<h3 style="text-align:center;">Instructions</h3>' +
      '<p><b>ABC Tune Backup Chord Solver</b> adds suggested backup chords to one or more ABC tunes.</p>' +
      '<p>It does <b>not</b> try to figure out chords directly from the notes.</p>' +
      '<p>Instead, it searches the thesession.org tune database for already-chorded measures from tunes with the same normalized meter, key, and mode, then copies chords from the closest matching measures.</p>' +
      '<p>The output is intended as a practical starting point for traditional Irish-style tunes.</p>' +
      '<p>Tunes in unusual keys, modes, meters, or other musical styles may produce limited, unexpected, or hilarious results.</p>' +
      '<h4>Setup</h4>' +
      '<ul>' +
      '<li>Open an ABC file or paste ABC text into the input box. Multiple tunes are supported.</li>' +
      '<li>The <b>Generate Backup Chords</b> button is enabled only when the input box contains text.</li>' +
      '<li>Use the red <b>Clear</b> button next to the <b>ABC Input</b> label to empty both the input and output areas.</li>' +
      '</ul>' +
      '<h4>How matching works</h4>' +
      '<ul>' +
      '<li>Existing chord symbols in the input tunes are stripped before processing.</li>' +
      '<li>For each source measure, the tool searches candidate database measures from tunes with the same normalized meter, key, and mode.</li>' +
      '<li>Only database measures whose chord symbols are plain uppercase-root major or minor triads are used, such as <b>D</b>, <b>G</b>, <b>Em</b>, <b>Bbm</b>, or <b>F#m</b>. Lowercase chords, slash chords, 5 chords, 7 chords, and extended chords are skipped.</li>' +
      '<li>The default minimum match score is <b>0.70</b>. If no normal match is found for a general measure, the tool can accept the best available match down to <b>75%</b> of the selected threshold. Critical tune, repeat, and part-boundary cases can still use the lower internal <b>0.35</b> boundary threshold.</li>' +
      '<li>If no matching measure with usable chords meets the threshold, that source measure is left unchanged.</li>' +
      '</ul>' +
      '<h4>Chord placement rules</h4>' +
      '<ul>' +
      '<li>Chords are only copied to allowed beat positions for the meter: 4/4 on beats 1 and 3; 2/4 on beats 1 and 2; 3/4 on beats 1, 2, and 3; 6/8 on beats 1 and 4; 9/8 on beats 1, 4, and 7; and 12/8 on beats 1, 4, 7, and 10.</li>' +
      '<li>Opening pickup notes before the first full measure are not chorded.</li>' +
      '<li>Short pickup notes leading into a new phrase or repeated part are not chorded; the next full measure is forced to get a chord if a usable match is found.</li>' +
      '<li>Repeated chord symbols are suppressed when the same chord continues across measures, except where a chord marker is required at important tune or repeat boundaries.</li>' +
      '</ul>' +
      '<h4>Running and output</h4>' +
      '<ul>' +
      '<li>Click <b>Generate Backup Chords</b>. A progress dialog shows the current tune, measure, candidate count, match count, and elapsed time.</li>' +
      '<li>Click <b>Cancel</b> in the progress dialog to stop processing and clear the output area.</li>' +
      '<li>When processing completes, the dialog closes and a summary appears in the main status area.</li>' +
      '<li>The <b>Copy Output to the Clipboard</b>, <b>Save Output to a File</b>, and <b>Test Output in the ABC Transcription Tools</b> buttons are updated after processing completes or is cancelled.</li>' +
      '<li>On iOS, saving uses the Share Sheet to allow you save the ABC to the Files area or share it with other applications.</li>' +
      '<li>The <b>Test Output in the ABC Transcription Tools</b> button is enabled only when the generated share link is short enough for direct transfer.</li>' +
      '</ul>' +
      '</div>';

    if (window.DayPilot && DayPilot.Modal) {
      DayPilot.Modal.alert(html, {
        theme: 'modal_flat',
        width: 720,
        scrollWithPage: true
      });
    } else {
      alert('Instructions are available when DayPilot.Modal is loaded. Please include the DayPilot.Modal library before using this button.');
    }
  }

  function normalizeMeter(m) {
    m = (m || "").trim().replace(/\s+/g, "");

    // ABC shorthand meter aliases:
    //   M:C  is common time, equivalent here to 4/4.
    //   M:C| is cut/common shorthand, but these tunebook reels/hornpipes
    //   are written as eight 1/8-note units per bar, so use the same
    //   matching and chord-placement bucket as 4/4.
    //
    // Normalizing these aliases is important because the chord database
    // often stores the same style of tune as 4/4, while source tunebooks
    // commonly write reels and hornpipes as M:C|.
    if (/^C$/i.test(m)) return "4/4";
    if (/^C\|$/i.test(m)) return "4/4";

    return m;
  }

  function normalizeMode(k) {
    k = (k || "").trim();
    k = k.replace(/%.*/, "").trim();
    k = k.replace(/\s+/g, "");
    k = k.replace(/^K:/i, "");
    k = k.replace(/^(HP|Hp|hp)$/, "");
    k = k.replace(/^(none|None)$/i, "");
    k = k.replace(/([A-Ga-g])#/g, function(_, n) { return n.toUpperCase() + "#"; });
    k = k.replace(/([A-Ga-g])b/g, function(_, n) { return n.toUpperCase() + "b"; });
    k = k.replace(/^([a-g])/, function(_, n) { return n.toUpperCase(); });

    var m = k.match(/^([A-G](?:#|b)?)(.*)$/);
    if (!m) return k.toLowerCase();

    var root = m[1];
    var mode = (m[2] || "").toLowerCase();

    mode = mode.replace(/^maj(or)?$/, "major");
    mode = mode.replace(/^min(or)?$/, "minor");
    mode = mode.replace(/^m$/, "minor");
    mode = mode.replace(/^dor(ian)?$/, "dorian");
    mode = mode.replace(/^mix(olydian)?$/, "mixolydian");
    mode = mode.replace(/^aeo(lian)?$/, "aeolian");
    mode = mode.replace(/^ion(ian)?$/, "major");
    mode = mode.replace(/^phr(ygian)?$/, "phrygian");

    if (!hb.body.trim() || !candidates.length) {
      if (progressState) {
        updateProgressModal(
          "Matching chords...<br>" +
          "Tune <b>" + progressState.tuneNumber + "</b> of <b>" + progressState.tuneCount + "</b>: <b>" + escapeHTML(title) + "</b><br>" +
          "No same meter/key/mode chord candidates were found for this tune."
        );
        await allowBrowserToUpdate();
      }
      return { text: tune, stats: { title: title, matched: 0, total: 0, skippedPickup: 0, candidates: candidates.length } };
    }

    var measures = buildMeasureObjects(hb.body, meter, unitLength);
    var matched = 0;
    var total = 0;
    var skippedPickup = 0;
    var fallbackMatched = 0;
    var lastChord = "";
    var firstChordInserted = false;
    var outParts = [];
    var totalMeasureCount = measures.filter(function(m) { return m.notes.length > 0; }).length;
    var processedMeasureCount = 0;
    var forceNextFullMeasureChord = false;

    for (var mi = 0; mi < measures.length; mi++) {
      throwIfCancelled();
      var m = measures[mi];

      if (!m.notes.length) {
        outParts.push(m.prefix + m.content + m.suffix);
        continue;
      }

      total++;
      processedMeasureCount++;

      if (m.isInitialPickup) {
        skippedPickup++;
        outParts.push(m.prefix + stripExistingChords(m.content) + m.suffix);
        continue;
      }

      // Do not inject chords on short pickup notes that lead into the next full
      // phrase or repeated part. The only exception is a partial measure that
      // actually ends a repeated section, because repeat endings are required
      // to carry an explicit chord marker when a match is found.
      //
      // When such a pickup is skipped, force an explicit chord on the next full
      // measure. This handles common ABC like ":| d|ea...", where the single
      // pickup note belongs to the new part but should not itself be chorded.
      if (m.isPartialMeasure && !m.isRepeatEnd) {
        skippedPickup++;
        forceNextFullMeasureChord = true;
        outParts.push(m.prefix + stripExistingChords(m.content) + m.suffix);
        continue;
      }

      var forceStartChord = !firstChordInserted || m.isRepeatStart || m.isRepeatEnd || forceNextFullMeasureChord;
      var normalThreshold = options.threshold;
      var effectiveThreshold = getEffectiveMeasureThreshold(normalThreshold, forceStartChord, options);

      var best = await findBestMeasureMatchAsync(
        m,
        candidates,
        effectiveThreshold,
        function(candidateDone, candidateTotal, bestScore) {
          var elapsed = performance.now() - progressState.startedAt;
          var overallPercent = progressState.totalMeasuresToMatch ?
            Math.round(((progressState.completedMeasures + processedMeasureCount - 1) / progressState.totalMeasuresToMatch) * 100) : 0;

          updateProgressModal(
            "Matching chords... <b>" + overallPercent + "%</b> complete, elapsed <b>" + formatElapsed(elapsed) + "</b><br>" +
            "Tune <b>" + progressState.tuneNumber + "</b> of <b>" + progressState.tuneCount + "</b>: <b>" + escapeHTML(title) + "</b><br>" +
            "Measure <b>" + processedMeasureCount + "</b> of <b>" + totalMeasureCount + "</b> in this tune; " +
            "Database candidates checked <b>" + candidateDone + "</b> of <b>" + candidateTotal + "</b>.<br>" +
            "Matches so far: <b>" + (progressState.totalMatched + matched) + "</b>; Fallback matches: <b>" + ((progressState.totalFallbackMatched || 0) + fallbackMatched) + "</b>;<br/>Skipped pickup measures: <b>" + (progressState.totalSkippedPickup + skippedPickup) + "</b>; Current best score: <b>" + bestScore.toFixed(3) + "</b>."
          );
        }
      );

      if (!best) {
        forceNextFullMeasureChord = false;
        outParts.push(m.prefix + stripExistingChords(m.content) + m.suffix);
        continue;
      }

      var chords = mapCandidateChordsToAllowedSourceBeats(m, best.measure, meter, unitLength, forceStartChord);

      // Chords copied from the database are only allowed on musically appropriate
      // beat locations for the current meter:
      //   4/4: beats 1 and 3
      //   2/4: beats 1 and 2
      //   6/8: beats 1 and 4
      //   9/8: beats 1, 4, and 7
      //   12/8: beats 1, 4, 7, and 10
      //   3/4: beats 1, 2, and 3
      // Boundary chords for tune starts, repeat starts, and repeat ends are still
      // forced onto the start of the measure when a matching database measure is found.

      if (!options.repeatSameChord) {
        var previousEmittedChord = lastChord;
        var filteredChords = [];

        chords.forEach(function(c) {
          // Forced boundary chords must survive repeated-chord suppression,
          // even when they repeat the previous chord from an earlier measure.
          if (c.forced) {
            filteredChords.push(c);
            previousEmittedChord = c.chord;
            return;
          }

          // Suppress any repeated chord that immediately continues from the
          // last emitted chord, whether it appears at the start of a measure,
          // later in the same measure, or across one or more measure lines.
          if (c.chord === previousEmittedChord) return;

          filteredChords.push(c);
          previousEmittedChord = c.chord;
        });

        chords = filteredChords;
      }

      if (!chords.length) {
        forceNextFullMeasureChord = false;
        outParts.push(m.prefix + stripExistingChords(m.content) + m.suffix);
        continue;
      }

      if (!forceStartChord && best.score < normalThreshold) fallbackMatched++;

      var injected = insertChordsIntoMeasure(m.content, chords, forceStartChord);
      if (chords.length) lastChord = chords[chords.length - 1].chord;
      firstChordInserted = true;
      forceNextFullMeasureChord = false;
      matched++;
      outParts.push(m.prefix + injected + m.suffix);
    }

    if (progressState) {
      progressState.completedMeasures += total;
      progressState.totalMatched += matched;
      progressState.totalSkippedPickup += skippedPickup;
      progressState.totalFallbackMatched = (progressState.totalFallbackMatched || 0) + fallbackMatched;
    }

    var outBody = outParts.join("");

    return {
      text: hb.header + (hb.header && outBody ? "\n" : "") + outBody,
      stats: { title: title, matched: matched, total: total, skippedPickup: skippedPickup, fallbackMatched: fallbackMatched, candidates: candidates.length }
    };
  }

  async function generateBackupChords() {
    var input = document.getElementById("input").value;
    if (!input.trim()) {
      showMessageDialog("Please enter or open some ABC notation first.");
      return;
    }

    gCancelRequested = false;
    var outputBox = document.getElementById("output");
    clearOutputArea();
    setProcessingControlsEnabled(false);
    setStatus("Processing...");
    showProgressModal("Loading and indexing tune database...");
    await allowBrowserToUpdate();

    try {
      await loadDatabase();
    } catch (err) {
      setProcessingControlsEnabled(true);
      hideProgressModal();
      setStatus("<b>Error:</b> " + escapeHTML(err.message) + "<br><br>Place <b>abctunes_thesession_28may2026.json</b> in the same folder as this tool, or statically include it as <b>window.abctunes_thesession_28may2026</b>.");
      return;
    }

    var threshold = parseFloat(document.getElementById("threshold").value || "0.70");
    var preTuneText = getABCPreTuneText(input);
    var tunes = splitTunes(input);
    var results = [];
    var allStats = [];

    var preParsedTunes = tunes.map(function(t) {
      t = stripExistingChordsFromTune(t);
      var hb = splitHeaderBody(t);
      var meter = getHeaderValue(hb.header, "M") || "4/4";
      var mode = getHeaderValue(hb.header, "K");
      var unitLength = getHeaderValue(hb.header, "L");
      return {
        tune: t,
        hb: hb,
        title: getHeaderValue(hb.header, "T") || "Untitled",
        measureCount: buildMeasureObjects(hb.body, meter, unitLength).filter(function(m) { return m.notes.length > 0; }).length
      };
    });

    var totalMeasuresToMatch = preParsedTunes.reduce(function(a, t) { return a + t.measureCount; }, 0);
    var progressState = {
      startedAt: performance.now(),
      tuneCount: tunes.length,
      tuneNumber: 0,
      totalMeasuresToMatch: totalMeasuresToMatch,
      completedMeasures: 0,
      totalMatched: 0,
      totalSkippedPickup: 0,
      totalFallbackMatched: 0
    };

    updateProgressModal(
      "Starting measure matching...<br>" +
      "Tunes: <b>" + tunes.length + "</b>; Measures to examine: <b>" + totalMeasuresToMatch + "</b>.<br>" +
      "Database index: <b>" + gLastStats.chordedTunes + "</b> Chorded tune settings, <b>" + gLastStats.chordedMeasures + "</b> Chorded measures, <b>" + gLastStats.keys + "</b> Meter/key/mode buckets."
    );
    await allowBrowserToUpdate();

    try {
      for (var i = 0; i < tunes.length; i++) {
        progressState.tuneNumber = i + 1;
        throwIfCancelled();
        updateProgressModal(
          "Matching chords...<br>" +
          "Tune <b>" + (i + 1) + "</b> of <b>" + tunes.length + "</b>: <b>" + escapeHTML(preParsedTunes[i].title) + "</b><br>" +
          "Overall matched so far: <b>" + progressState.totalMatched + "</b>; Skipped pickup measures: <b>" + progressState.totalSkippedPickup + "</b>."
        );
        await allowBrowserToUpdate();

        var r = await processTuneAsync(tunes[i], { threshold: threshold, fallbackThresholdScale: 0.75, boundaryThreshold: 0.35, repeatSameChord: false }, progressState);
        results.push(r.text);
        allStats.push(r.stats);

        if (outputBox) {
          var partialOutput = results.join("\n\n").trim();
          if (preTuneText) partialOutput = preTuneText + "\n\n" + partialOutput;
          setOutputAreaDuringProcessing(partialOutput + "\n");
        }
        await allowBrowserToUpdate();
      }
    } catch (err) {
      setProcessingControlsEnabled(true);
      hideProgressModal();
      if (err && err.message === "USER_CANCELLED") {
        clearOutputArea();
        setStatus("Measure matching cancelled.");
        return;
      }
      clearOutputArea();
      setStatus("<b>Error:</b> " + escapeHTML(err && err.message ? err.message : err));
      return;
    } finally {
      setProcessingControlsEnabled(true);
    }

    hideProgressModal();
    var output = results.join("\n\n").trim();
    if (preTuneText) output = preTuneText + "\n\n" + output;
    output += "\n";
    setOutputArea(output);

    var totalMeasures = allStats.reduce(function(a, s) { return a + s.total; }, 0);
    var totalMatched = allStats.reduce(function(a, s) { return a + s.matched; }, 0);
    var totalPickup = allStats.reduce(function(a, s) { return a + s.skippedPickup; }, 0);
    var totalFallback = allStats.reduce(function(a, s) { return a + (s.fallbackMatched || 0); }, 0);
    var withCandidates = allStats.filter(function(s) { return s.candidates > 0; }).length;
    var elapsed = performance.now() - progressState.startedAt;

    setStatus(
      "Done in <b>" + formatElapsed(elapsed) + "</b>. Processed <b>" + tunes.length + "</b> tune(s).<br/>" +
      "Matched and injected chords into <b>" + totalMatched + "</b> of <b>" + totalMeasures + "</b> non-pickup measure(s).<br/>" +
      "Used the general fallback threshold for <b>" + totalFallback + "</b> match(es).<br/>" +
      "Skipped <b>" + totalPickup + "</b> opening pickup measure(s).<br>" +
      "Database index: <b>" + gLastStats.chordedTunes + "</b> chorded tune settings, <b>" + gLastStats.chordedMeasures + "</b> chorded measures, <b>" + gLastStats.keys + "</b> meter/key/mode buckets.<br/>" +
      "Input tunes with same meter/key/mode candidates: <b>" + withCandidates + "</b>."
    );
  }

  function openABCFile(evt) {
    var file = evt.target.files && evt.target.files[0];
    if (!file) return;
    clearOutputArea();
    gSaveFilename = "abc_backup_chords.abc";
    var reader = new FileReader();
    reader.onload = function(e) {
      var loadedABC = e.target.result || "";
      var tuneCount = splitTunes(loadedABC).length;
      document.getElementById("input").value = loadedABC;
      updateGenerateButtonState();
      clearOutputArea();
      setStatus("Loaded <b>" + escapeHTML(file.name) + "</b> with <b>" + tuneCount + "</b> tune" + (tuneCount === 1 ? "" : "s") + ".");
    };
    reader.readAsText(file);
  }

  function clearInputAndOutput() {
    var input = document.getElementById("input");
    if (input) input.value = "";
    updateGenerateButtonState();
    clearOutputArea();
    gSaveFilename = "abc_backup_chords.abc";

    var fileInput = document.getElementById("selectabcfile");
    if (fileInput) fileInput.value = "";

    setStatus("Input and output cleared.");
  }

  async function requestSaveFilename(defaultName) {
    defaultName = normalizeSaveFilename(defaultName || "abc_backup_chords.abc");

    if (window.DayPilot && DayPilot.Modal && DayPilot.Modal.prompt) {
      try {
        var args = await DayPilot.Modal.prompt("Please enter a filename for your output ABC file:", defaultName, {
          theme: "modal_flat",
          width: 520,
          top: 150,
          scrollWithPage: true
        });

        if (!args || args.canceled) return null;
        return args.result;
      } catch (err) {
        // Fall through to the browser prompt if the DayPilot prompt API is
        // unavailable or behaves differently in a locally included version.
      }
    }

    return prompt("Please enter a filename for your output ABC file:", defaultName);
  }

  function normalizeSaveFilename(fname) {
    fname = (fname || "").replace(/[^a-zA-Z0-9_\-. ]+/g, "").trim();
    if (!fname) return "";

    // Only .abc and .txt are valid output extensions. If the user enters
    // another extension, replace that extension with .abc. If they enter no
    // extension, add .abc.
    if (/\.(abc|txt)$/i.test(fname)) return fname;
    if (/\.[^.\/]+$/.test(fname)) return fname.replace(/\.[^.\/]+$/, ".abc");
    return fname + ".abc";
  }

  function isIOSDevice() {
    // Detect iPhone/iPad/iPod, including modern iPadOS Safari which can report
    // itself as Macintosh while still supporting touch events.
    return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  }

  function configureFileOpenAccept() {
    var fileInput = document.getElementById("selectabcfile");
    if (!fileInput) return;

    // iOS/iPadOS Files can be overly strict about the accept list and may
    // gray out .abc files if the extension is not mapped to a known system
    // document type. On iOS, remove the accept filter entirely so ABC files
    // remain selectable. Other platforms keep the broader ABC/text filter.
    if (isIOSDevice()) {
      fileInput.removeAttribute("accept");
    } else {
      fileInput.setAttribute("accept", ".abc,.ABC,.txt,.TXT,text/plain,text/*,application/octet-stream,application/vnd.abc");
    }
  }

  async function shareOutputFileOnIOS(data, fname) {
    if (!isIOSDevice()) return false;

    if (!window.File || !navigator.share || !navigator.canShare) return false;

    var file = new File([data], fname, { type: "application/octet-stream" });
    var shareData = {
      files: [file]
    };

    if (!navigator.canShare(shareData)) return false;

    await navigator.share(shareData);
    return true;
  }

  async function saveOutput() {
    var data = document.getElementById("output").value;
    if (!data.length) { showMessageDialog("Nothing to Save"); return; }

    var fname = await requestSaveFilename(gSaveFilename || "abc_backup_chords.abc");
    if (fname === null || fname === undefined) return;

    fname = normalizeSaveFilename(fname);
    if (!fname) return;

    gSaveFilename = fname;

    // On iOS, use the Share Sheet with a real File object instead of the
    // browser download path. This avoids Safari appending .txt to filenames
    // such as myfile.abc when saving text/plain downloads.
    try {
      if (await shareOutputFileOnIOS(data, fname)) {
        setStatus("Shared <b>" + escapeHTML(fname) + "</b> using the iOS Share Sheet.");
        return;
      }
    } catch (err) {
      // If the user cancels the Share Sheet, do not fall back to a download on
      // iOS because that is the path that can add an unwanted .txt extension.
      if (isIOSDevice()) {
        return;
      }
    }

    var blob = new Blob([data], { type: "application/octet-stream" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.style.display = "none";
    a.href = url;
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }

  function copyOutputToClipboard() {
    var text = document.getElementById("output").value;
    if (!text.length) { showMessageDialog("Nothing to copy to the Clipboard"); return; }
    copyToClipboard(text).then(function() {
      var btn = document.getElementById("copybutton");
      btn.innerHTML = "Output copied to the Clipboard!";
      setTimeout(function() { btn.innerHTML = "Copy Output to the Clipboard"; }, 1250);
    }).catch(function() { showMessageDialog("Unable to copy to Clipboard."); });
  }

  function copyToClipboard(text) {
    if (navigator.clipboard && window.isSecureContext) return navigator.clipboard.writeText(text);
    return new Promise(function(resolve, reject) {
      var textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.position = "fixed";
      textArea.style.left = "-999999px";
      textArea.style.top = "-999999px";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      try { document.execCommand("copy") ? resolve() : reject(); }
      catch (err) { reject(err); }
      textArea.remove();
    });
  }

  function testOutput() {
    var abcText = document.getElementById("output").value;
    updateShareLinkForOutput(abcText);

    if (!abcText.length) {
      showMessageDialog("Nothing to test!");
      return;
    }

    if (!gOutputShareURL) {
      showMessageDialog("Output too long to test directly in ABC Transcription Tools. Please Save or Copy the output instead.");
      return;
    }

    window.open(gOutputShareURL, "_blank");
  }

  window.addEventListener("pageshow", function() {
    initializeTool();
  });

  window.addEventListener("load", function() {
    document.getElementById("selectabcfile").addEventListener("change", openABCFile);
    var input = document.getElementById("input");
    if (input) input.addEventListener("input", handleInputChanged);
    var output = document.getElementById("output");
    if (output) output.addEventListener("input", function() {
      updateOutputActionButtons(output.value);
      updateShareLinkForOutput(output.value);
    });
    initializeTool();
    gInputInitialized = true;
  });

  </script>
</head>

    <div id="progress_modal_box">
      <h3>Matching Backup Chords</h3>
      <div id="progress_modal_status">Starting...</div>
      <div id="progress_modal_buttons">
        <button class="btn btn-controls" onclick="cancelProcessing();" title="Stop measure matching and clear the output area">Cancel</button>
      </div>
    </div>
  </div>

  <div id="maindiv">
    <div style="text-align: center;">
      <h1>ABC Tune Backup Chord Solver</h1>
      <h2>Batch Processor for Adding Backup Chords to Traditional Irish Tunes</h2>
    </div>

    <hr id="abcinput">

    <div style="text-align:left">
      <div class="input_label_row">
        <h4>ABC Input:</h4>
        <button id="clearbutton" class="btn" onclick="clearInputAndOutput();" title="Clear both the input and output areas">Clear</button>
      </div>
      <div class="input_button_row">
        <input type="file" id="selectabcfile" accept=".abc,.ABC,.txt,.TXT,text/plain,text/*,application/octet-stream,application/vnd.abc" hidden/>
        <label class="abcupload btn btn-controls" for="selectabcfile" title="Open an existing ABC or text file">Open an existing .ABC file</label>
      </div>

      <div class="input_textarea_wrapper">
        <p><textarea id="input" placeholder="Enter ABC notation here" spellcheck="false" autocorrect="off" autocapitalize="none" autocomplete="off">X: 1

BAB dBd|ege dBd|gfg aga|bgf g3:|</textarea></p>
      </div>

      <p style="margin-top:10px;">
        <label class="option">Minimum match score:&nbsp;
          <input id="threshold" type="number" min="0.10" max="1.00" step="0.05" value="0.70" style="width:70px; font-size:11pt;">
        </label>
        <span class="smallnote">&nbsp;&nbsp;Lower finds more matches; higher is stricter. Default is 0.70.</span>
      </p>

      <p style="margin-top:10px;">
        <button id="generatebutton" class="btn btn-generate full_width_tool_button" onclick="generateBackupChords();">Generate Backup Chords</button>
      </p>

      <div id="status" class="status"></div>

      <hr>

      <h4>Processed ABC Output, with Suggested Backup Chords:</h4>
      <p><textarea id="output" placeholder="Processed ABC output will appear here" spellcheck="false" autocorrect="off" autocapitalize="none"></textarea></p>

      <div class="output_button_row">
        <button id="copybutton" class="btn btn-controls" onclick="copyOutputToClipboard();" disabled title="Generate output before copying">Copy Output to the Clipboard</button>
        <button id="savebutton" class="btn btn-controls" onclick="saveOutput();" disabled title="Generate output before saving">Save Output to a File</button>
        <button id="testbutton" class="btn btn-controls" onclick="testOutput();" disabled title="Generate output before testing it in the ABC Transcription Tools">Test Output in the ABC Transcription Tools</button>
      </div>

      <p style="margin-top:0; margin-bottom:48px;">
        <button class="btn btn-controls" style="width:100%; box-sizing:border-box;" onclick="showInstructions();" title="Show instructions for using the ABC Tune Backup Chord Solver">Instructions</button>
      </p>
    </div>
  </div>
</body>
