<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Thumpatron</title>
  <meta property="og:type" content="website" />
  <meta property="og:title" content="The Thumpatron" />
  <meta property="og:description" content="Bodhrán backing tracks for Reels, Jigs, and Polkas." />
  <meta property="og:url" content="https://michaeleskin.com/tools/thumpatron.html" />
  <meta property="og:site_name" content="The Thumpatron" />
  <meta property="og:image" content="https://michaeleskin.com/tools/img/thumpatron_og3.jpg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/png" sizes="32x32" href="https://michaeleskin.com/tools/img/thumpatron-favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --green-900: #0b3d20;
      --green-800: #11552c;
      --green-700: #18723a;
      --green-600: #1f8a47;
      --green-500: #29a35a;
      --green-400: #4cc777;
      --green-300: #8ce0a7;
      --green-200: #c8f2d2;
      --cream: #f6fff8;
      --gold: #ffe082;
      --shadow: rgba(6, 36, 18, 0.25);
      --danger: #b91c1c;
      --danger-dark: #991b1b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 30%),
        linear-gradient(180deg, #0b3d20 0%, #082b15 50%, #041a0d 100%);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #051f10 0%, #03160b 60%, #020f07 100%);
      z-index: -2;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px;
    }

    .hero {
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.08));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 12px 24px;
      box-shadow: 0 18px 50px var(--shadow);
      backdrop-filter: blur(8px);
      position: relative;
    }

    h1 {
      font-family: "Cinzel", serif;
      font-size: 3rem;
      letter-spacing: 1px;
      font-weight: normal;
      text-align: center;
      margin: 0 0 4px 0;
      color: #d4ffe8;
      text-shadow:
        0 0 4px rgba(34,197,94,0.55),
        0 0 12px rgba(34,197,94,0.45),
        0 0 24px rgba(34,197,94,0.30),
        0 0 40px rgba(34,197,94,0.18);
    }

    .subtitle {
      margin: 0;
      color: var(--green-200);
      font-size: 1.05rem;
    }

    .toolbar {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(0,0,0,0.15);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 16px 20px;
    }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 2;
      min-width: 500px;
    }

    .volume-wrap label {
      font-weight: 700;
      white-space: nowrap;
    }

    .volume-wrap input[type="range"] {
      flex: 1;
      width: 100%;
      min-width: 300px;
    }

    .volume-value {
      min-width: 48px;
      margin-left: 6px;
      text-align: left;
      color: var(--green-200);
      font-weight: 700;
    }
    
    .stop-btn {
      appearance: none;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #dc2626, var(--danger-dark));
      color: white;
      font-weight: 700;
      padding: 12px 18px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
      transition: transform 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
      margin-left: 20px;
      flex: 0 0 auto;
    }

    .stop-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .stop-btn:active {
      transform: translateY(1px);
    }

    .status {
      color: var(--green-200);
      font-size: 0.96rem;
      min-height: 1.2em;
      flex: 1 1 240px;
      text-align: right;
      margin-left: auto;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 14px 36px var(--shadow);
    }

    .card h2 {
      margin: 0 0 12px 0;
      font-size: 1.35rem;
      color: white;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .track-btn {
      position: relative;
      appearance: none;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      min-height: 46px;
      padding: 12px 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      overflow: hidden;
      text-align: center;
    }

    .track-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.28);
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }

    .track-btn:active {
      transform: translateY(1px);
    }

    .track-btn .tempo {
      display: block;
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1.1;
      white-space: nowrap;
    }

    .track-btn.loading {
      opacity: 0.8;
      cursor: progress;
    }

    .track-btn.loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transform: translateX(-100%);
      animation: loadingShimmer 1.2s linear infinite;
    }

    .track-btn.playing {
      border-color: rgba(255, 224, 130, 0.88);
      background: linear-gradient(180deg, rgba(76,199,119,0.28), rgba(255,224,130,0.14));
      box-shadow: 0 0 0 1px rgba(255,224,130,0.2), 0 14px 30px rgba(0,0,0,0.28);
    }

    .track-btn.playing::before,
    .track-btn.playing::after {
      content: '';
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      opacity: 0.65;
    }

    .track-btn.playing::before {
      width: 130px;
      height: 130px;
      left: -18px;
      top: -24px;
      background: radial-gradient(circle, rgba(255,224,130,0.45), transparent 65%);
      animation: pulseGlow 1.5s ease-in-out infinite;
    }

    .track-btn.playing::after {
      width: 150px;
      height: 150px;
      right: -35px;
      bottom: -48px;
      background: radial-gradient(circle, rgba(76,199,119,0.42), transparent 65%);
      animation: pulseGlow 1.5s ease-in-out 0.4s infinite;
    }

    .track-btn.playing .tempo {
      color: var(--gold);
    }

    .legend {
      color: var(--green-200);
      font-size: 1rem;
      line-height: 1.5;
      text-align: center;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--green-200);
      font-size: 0.9rem;
      text-align: center;
      margin-bottom:3px;
    }

    .instructions-title{
      line-height: 1.5;
    }

    .status .count-in-wrap {
      display: inline-block;
      white-space: nowrap;
    }

    .status .count-in-num {
      display: inline-block;
      min-width: 0.9em;
      text-align: center;
      color: var(--green-200);
      transition: color 0.08s ease, text-shadow 0.08s ease, transform 0.08s ease;
    }

    .status .count-in-num.active {
      color: var(--gold);
      text-shadow:
        0 0 4px rgba(255, 224, 130, 0.9),
        0 0 10px rgba(255, 224, 130, 0.7),
        0 0 18px rgba(255, 224, 130, 0.45);
      transform: scale(1.08);
    }

    a {
      color: var(--green-300);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.15s ease, text-shadow 0.15s ease;
    }

    a:hover {
      color: var(--gold);
      text-shadow: 0 0 6px rgba(255, 224, 130, 0.6);
    }

    a:active {
      color: #fff3b0;
      text-shadow: 0 0 4px rgba(255, 224, 130, 0.8);
    }

    a:visited {
      color: #9bd8b2;
    }

    a:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
      border-radius: 4px;
    }

    @keyframes pulseGlow {
      0%, 100% {
        transform: scale(0.92);
        opacity: 0.45;
      }
      50% {
        transform: scale(1.08);
        opacity: 0.85;
      }
    }

    @keyframes loadingShimmer {
      to {
        transform: translateX(100%);
      }
    }

    @media (max-width: 860px) {
      .wrap {
        padding: 14px;
      }

      .hero {
        padding: 18px;
        border-radius: 18px;
      }

      .toolbar {
        padding: 14px;
        flex-wrap: wrap;
        align-items: stretch;
        gap: 12px;
      }

      .volume-wrap {
        flex: 1 1 100%;
        min-width: 0;
        margin-top:10px;
      }

      .volume-wrap input[type="range"] {
        min-width: 0;
      }

      .stop-btn {
        margin-left: 0;
        margin-top: 8px;
        flex: 0 0 auto;
      }

      .status {
        flex: 1 1 auto;
        margin-left: 0;
        text-align: right;
        white-space: normal;
        align-self: end;
        margin-top: 8px;
      }

      .grid {
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      }

    }

    @media (max-width: 640px) {
      h1 {
        margin-top:1px;
        font-size: 1.5rem;
        line-height: 1.2rem;
      }
      .legend{
        font-size: 0.8rem;
        line-height: 1.5;
      }
    }

    .help-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      font-size: 20px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .help-btn:hover {
      border-color: rgba(255,255,255,0.4);
      box-shadow: 0px 0px 10px rgba(0,255,0,0.18);
    }

    .settings-btn {
      position: absolute;
      top: 18px;
      left: 18px;

      font-size: 20px;          
      line-height: 1;
      font-weight: 700;

      padding: 0;
      border-radius: 10px;

      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.18);
      color: white;

      width: 44px;
      height: 44px;

      display: flex;
      align-items: center;
      justify-content: center;

      -webkit-text-size-adjust: 100%;
    }

    .settings-btn:hover {
      border-color: rgba(255,255,255,0.4);
      box-shadow: 0px 0px 10px rgba(0,255,0,0.18);
    }

    .count-in-pills {
      display: flex;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #9dbaf2;
      background: #e8f1ff;
      margin: 0 0 14px 0;
    }

    .count-in-pills input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .count-in-pills label {
      flex: 1 1 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
      cursor: pointer;
      font-weight: 700;
      color: #000;
      user-select: none;
      text-align: center;
      transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
    }

    .count-in-pills label + input + label {
      border-left: 1px solid #9dbaf2;
    }

    .count-in-pills input[type="radio"]:checked + label {
      background: linear-gradient(180deg, #4cc777, #1f8a47);
      color: #fff;
      box-shadow: inset 0 0 10px rgba(34,197,94,0.35);
    }

    .count-in-pills label:hover {
      background: rgba(76,199,119,0.2);
    }

    @media (max-width: 600px) {
      .count-in-pills label {
        padding: 8px 0;
        font-size: 14px;
      }
    }

    .modal_compact_background {
      position: fixed !important;
      inset: 0 !important;
      background: rgba(0,0,0,0.4) !important;
    }

    .modal_compact_main {
      position: fixed !important;
      left: 50% !important;
      top: 37px !important;
      transform: translateX(-50%) !important;
      margin: 0 !important;
      border: 1px solid #333;
      box-shadow: 0 0 15px -2px rgba(0,0,0,0.75);
      width: min(560px, calc(100vw - 60px)) !important;
      max-width: min(560px, calc(100vw - 60px)) !important;
      height: auto !important;
      max-height: min(750px, calc(100dvh - 60px)) !important;
      overflow: hidden !important;
    }

    .modal_compact_inner {
      padding: 18px 36px 28px 36px;
      background: #fff;
      color: #000;
      display: flex;
      flex-direction: column;
    }

    .modal_compact_content {
      margin: 16px 0 10px 0;
      overflow: auto !important;
      -webkit-overflow-scrolling: touch;
      flex: 1 1 auto;
    }

    .modal_compact_buttons {
      text-align: center;
      margin-top: 18px;
    }

    .modal_compact_buttons button {
      margin: 0 8px;
    }

    .modal_compact_main button {
      background: #e8f1ff;
      color: #000;
      border: 1px solid #9dbaf2;
      padding: 10px 20px;
      cursor: pointer;
      outline: none;
      width: 100px;
      border-radius: 10px;
      font-weight: 600;
    }

    .modal_compact_main .modal_default_promptdescription {
      font-size: 20px !important;
      line-height: 1.5 !important;
    }

    .modal_compact_main .modal_default_prompt,
    .modal_compact_main input:not([type="range"]):not([type="checkbox"]):not([type="radio"]),
    .modal_compact_main .modal_default_prompt input {
      font-size: 18px !important;
      padding: 8px 9px !important;
      height: auto !important;
      background-color: white !important;
      border-radius: 10px;
      color: black;
    }

    .modal_instructions_background {
      position: fixed !important;
      inset: 0 !important;
      background: rgba(0,0,0,0.45) !important;
    }

    .modal_instructions_main {
      position: fixed !important;
      left: 50% !important;
      top: 15px !important;
      transform: translate(-50%, 0%) !important;
      margin: 0 !important;
      border: 1px solid #333;
      box-shadow: 0 0 18px -2px rgba(0,0,0,0.75);
      width: min(800px, calc(100vw - 60px)) !important;
      max-width: min(800px, calc(100vw - 60px)) !important;
      height: auto !important;
      max-height: 80dvh !important;
      overflow: hidden !important;
    }

    .modal_instructions_inner {
      padding: 8px 28px 32px 28px;
      background: #fff;
      color: #000;
      display: flex;
      flex-direction: column;
      height: 100%;
      max-height: 75dvh;
    }

    .modal_instructions_content {
      margin: 14px 0 10px 0;
      overflow-y: auto !important;
      overflow-x: hidden !important;
      -webkit-overflow-scrolling: touch;
      flex: 1 1 auto;
      min-height: 0;
      line-height: 1.5;
      font-size: 16px;
      padding-right: 10px;
    }

    .modal_instructions_content h3 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    .modal_instructions_content h4 {
      margin: 18px 0 6px 0;
      font-size: 17px;
    }

    .modal_instructions_content p {
      margin: 0 0 10px 0;
    }

    .modal_instructions_content ul {
      margin: 0 0 12px 18px;
      padding: 0;
    }

    .modal_instructions_content li {
      margin: 0 0 8px 0;
    }

    .modal_instructions_buttons {
      text-align: center;
      margin-top: 16px;
      flex: 0 0 auto;
    }

    .modal_instructions_buttons button {
      margin: 0 8px;
    }

    .modal_instructions_main button {
      background: #e8f1ff;
      color: #000;
      border: 1px solid #9dbaf2;
      padding: 10px 20px;
      cursor: pointer;
      outline: none;
      border-radius: 10px;
      font-weight: 600;
    }
  </style>

</head>

<body>
  <div class="wrap">
    <div class="hero">
      <button
        id="settingsBtn"
        class="settings-btn"
        title="Open settings."
        aria-label="Open settings."
      >
        ☰
      </button>
      <h1>The Thumpatron</h1>
      <div class="legend">
        Bodhrán backing tracks for tune practice
      </div>
      <button
        id="instructionsBtn"
        class="help-btn"
        title="Open detailed instructions for using The Thumpatron."
      >
        ?
      </button>
      <div class="toolbar">
        <div class="volume-wrap">
          <label for="volumeSlider">Volume</label>
          <input id="volumeSlider" type="range" min="0" max="100" value="75" step="1" />
          <div id="volumeValue" class="volume-value">75%</div>
        </div>

        <button id="stopAllBtn" class="stop-btn" type="button">Stop All Play</button>

        <div id="status" class="status">Ready.</div>
      </div>

      <div class="grid" id="trackGrid"></div>

      <div class="footer-note">
        Created by <a href="https://michaeleskin.com" target="_blank" rel="noopener noreferrer">Michael Eskin</a>
      </div>

    </div>
  </div>

          { tempo: 120, file: 'F3.mp3', trimMs: 0 },
          { tempo: 125, file: null, trimMs: 0 },
          { tempo: 130, file: 'Gb3.mp3', trimMs: 0 },

          { tempo: 140, file: 'G3.mp3', trimMs: 0 },

      const state = {
        audioCtx: null,
        gainNode: null,
        bufferCache: new Map(),
        loadingMap: new Map(),
        currentTrackId: null,
        currentSource: null,
        currentButton: null,
        currentHumanizeTimer: null,

        pendingButton: null,

        countInSources: [],

      function getSafeLocalStorage() {
        try {
          return window.localStorage;
        } catch (err) {
          return null;
        }
      }

      function loadVolumePreference() {
        const storage = getSafeLocalStorage();
        if (!storage) {
          return DEFAULT_VOLUME_LEVEL;
        }

        try {
          const raw = storage.getItem(VOLUME_STORAGE_KEY);

          if (raw === null) {
            return DEFAULT_VOLUME_LEVEL;
          }

          const value = Number(raw);

          if (!Number.isFinite(value)) {
            return DEFAULT_VOLUME_LEVEL;
          }

          return Math.max(0, Math.min(1, value));
        } catch (err) {
          return DEFAULT_VOLUME_LEVEL;
        }
      }

      function saveVolumePreference(volume) {
        const storage = getSafeLocalStorage();
        if (!storage) {
          return;
        }

        try {
          storage.setItem(VOLUME_STORAGE_KEY, String(Math.max(0, Math.min(1, volume))));
        } catch (err) {
          // Ignore storage write errors.
        }
      }
      function loadTempoFilterPreference() {
        const storage = getSafeLocalStorage();
        if (!storage) {
          return 'all';
        }

        try {
          const saved = storage.getItem(TEMPO_FILTER_STORAGE_KEY);
          return TEMPO_FILTER_OPTIONS.includes(saved) ? saved : 'all';
        } catch (err) {
          return 'all';
        }
      }

      function saveTempoFilterPreference(filterMode) {
        const storage = getSafeLocalStorage();
        if (!storage) {
          return;
        }

        try {
          storage.setItem(TEMPO_FILTER_STORAGE_KEY, filterMode);
        } catch (err) {
          // Ignore storage write errors.
        }
      }

      function loadHumanizeEnabledPreference() {
        const storage = getSafeLocalStorage();
        if (!storage) {
          return false;
        }

        try {
          return storage.getItem(HUMANIZE_ENABLED_STORAGE_KEY) === 'true';
        } catch (err) {
          return false;
        }
      }

      function loadHumanizeLevelPreference() {
        const storage = getSafeLocalStorage();
        if (!storage) {
          return DEFAULT_HUMANIZE_LEVEL;
        }

        try {
          const raw = storage.getItem(HUMANIZE_LEVEL_STORAGE_KEY);

          // If nothing has been saved yet, use default
          if (raw === null) {
            return DEFAULT_HUMANIZE_LEVEL;
          }

          const value = Number(raw);

          // Guard against invalid values
          if (!Number.isFinite(value)) {
            return DEFAULT_HUMANIZE_LEVEL;
          }

          return Math.max(0, Math.min(100, Math.round(value)));
        } catch (err) {
          return DEFAULT_HUMANIZE_LEVEL;
        }
      }

      function saveHumanizePreferences(enabled, level) {
        const storage = getSafeLocalStorage();
        if (!storage) {
          return;
        }

        try {
          storage.setItem(HUMANIZE_ENABLED_STORAGE_KEY, enabled ? 'true' : 'false');
          storage.setItem(HUMANIZE_LEVEL_STORAGE_KEY, String(Math.max(0, Math.min(100, Math.round(level)))));
        } catch (err) {
          // Ignore storage write errors.
        }
      }

      function loadCountInBeatsPreference() {
        const storage = getSafeLocalStorage();
        if (!storage) {
          return 0;
        }

        try {
          const raw = storage.getItem(COUNT_IN_BEATS_STORAGE_KEY);
          const value = Number(raw);

          if (value === 4 || value === 8) {
            return value;
          }

          return 0;
        } catch (err) {
          return 0;
        }
      }

      function loadCountInStoppedOnlyPreference() {
        const storage = getSafeLocalStorage();
        if (!storage) {
          return false;
        }

        try {
          return storage.getItem(COUNT_IN_STOPPED_ONLY_STORAGE_KEY) === 'true';
        } catch (err) {
          return false;
        }
      }

      function saveCountInPreferences(countInBeats, stoppedOnly) {
        const storage = getSafeLocalStorage();
        if (!storage) {
          return;
        }

        try {
          const safeBeats = countInBeats === 4 || countInBeats === 8 ? countInBeats : 0;
          storage.setItem(COUNT_IN_BEATS_STORAGE_KEY, String(safeBeats));
          storage.setItem(COUNT_IN_STOPPED_ONLY_STORAGE_KEY, stoppedOnly ? 'true' : 'false');
        } catch (err) {
          // Ignore storage write errors.
        }
      }

      function clampNumber(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function getHumanizeDepth(level) {
        return (clampNumber(level, 0, 100) / 100) * MAX_HUMANIZE_DEPTH;
      }

      function stopHumanizeModulation() {
        if (state.currentHumanizeTimer) {
          window.clearInterval(state.currentHumanizeTimer);
          state.currentHumanizeTimer = null;
        }
      }

      function startHumanizeModulation(source) {
        stopHumanizeModulation();

        if (!source || !state.humanizeEnabled) {
          return;
        }

        const ctx = ensureAudioContext();
        const depth = getHumanizeDepth(state.humanizeLevel);

        if (!depth) {
          return;
        }

        let drift = 0;
        source.playbackRate.cancelScheduledValues(ctx.currentTime);
        source.playbackRate.setValueAtTime(1, ctx.currentTime);

        state.currentHumanizeTimer = window.setInterval(function () {
          if (state.currentSource !== source) {
            stopHumanizeModulation();
            return;
          }

          const now = ctx.currentTime;
          drift = (drift * 0.72) + ((Math.random() * 2 - 1) * depth * 0.45);

          const targetRate = clampNumber(
            1 + drift + ((Math.random() * 2 - 1) * depth * 0.55),
            1 - depth,
            1 + depth
          );

          source.playbackRate.cancelScheduledValues(now);
          source.playbackRate.setValueAtTime(source.playbackRate.value, now);
          source.playbackRate.linearRampToValueAtTime(targetRate, now + HUMANIZE_RAMP_TIME);
        }, HUMANIZE_INTERVAL_MS);
      }

      function getVisibleEntriesForStyle(entries, filterMode) {
        if (!Array.isArray(entries) || !entries.length || filterMode === 'all') {
          return entries;
        }

        const total = entries.length;
        const visibleCount = Math.min(total, Math.max(1, Math.ceil((total * 2) / 3)));

        if (filterMode === 'slow') {
          return entries.slice(0, visibleCount);
        }

        if (filterMode === 'fast') {
          return entries.slice(total - visibleCount);
        }

        if (filterMode === 'medium') {
          const start = Math.max(0, Math.floor((total - visibleCount) / 2));
          return entries.slice(start, start + visibleCount);
        }

        return entries;
      }

      function getLoopEndTime(track, audioBuffer) {
        const duration = audioBuffer.duration;
        if (!duration || duration <= 0) {
          return { loopStart: 0, loopEnd: 0 };
        }

        const beatDuration = 60 / track.tempo;
        if (!isFinite(beatDuration) || beatDuration <= 0) {
          return { loopStart: 0, loopEnd: duration };
        }

        const totalBeats = duration / beatDuration;
        const groupsOf8 = Math.floor(totalBeats / 8);
        const beatCount = groupsOf8 * 8;

        if (beatCount < 8) {
          return { loopStart: 0, loopEnd: duration };
        }

        let loopEnd = beatCount * beatDuration;

        const trimSeconds = (track.trimMs || 0) / 1000;
        loopEnd = Math.max(0, loopEnd - trimSeconds);

        let loopStart = 8 * beatDuration;

        if (loopStart >= loopEnd) {
          loopStart = 0;
        }

        loopEnd = Math.min(loopEnd, duration);

        return { loopStart, loopEnd };
      }

      function setStatus(message, allowHtml=false) {
        if (allowHtml) {
          els.status.innerHTML = message;
        } else {
          els.status.textContent = message;
        }
      }

      function getTrackId(style, tempo) {
        return style + '-' + tempo;
      }

      function ensureAudioContext() {
        if (!state.audioCtx) {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) {
            throw new Error('Web Audio is not supported in this browser.');
          }
          state.audioCtx = new AudioContextClass();
          state.gainNode = state.audioCtx.createGain();
          state.gainNode.gain.value = state.volume;
          state.gainNode.connect(state.audioCtx.destination);
        }
        return state.audioCtx;
      }

      async function resumeAudioContext() {
        const ctx = ensureAudioContext();
        if (ctx.state === 'suspended') {
          await ctx.resume();
        }
        return ctx;
      }

      async function fetchAndDecodeBuffer(cacheKey, file) {
        if (state.bufferCache.has(cacheKey)) {
          return state.bufferCache.get(cacheKey);
        }

        if (state.loadingMap.has(cacheKey)) {
          return state.loadingMap.get(cacheKey);
        }

        const promise = (async () => {
          const ctx = ensureAudioContext();
          const response = await fetch(BASE_URL + file, { cache: 'force-cache' });
          if (!response.ok) {
            throw new Error('Failed to fetch ' + file + ' (' + response.status + ')');
          }
          const arrayBuffer = await response.arrayBuffer();
          const audioBuffer = await ctx.decodeAudioData(arrayBuffer.slice(0));
          state.bufferCache.set(cacheKey, audioBuffer);
          return audioBuffer;
        })();

        state.loadingMap.set(cacheKey, promise);

        try {
          return await promise;
        } finally {
          state.loadingMap.delete(cacheKey);
        }
      }

      function getAvailableSourceEntries(style) {
        return (TRACKS[style] || []).filter(function (entry) {
          return typeof entry.file === 'string' && entry.file.length > 0;
        });
      }

      function chooseBestSourceEntry(style, targetTempo) {
        const availableEntries = getAvailableSourceEntries(style);

        if (!availableEntries.length) {
          throw new Error('No source samples are available for ' + style + '.');
        }

        let bestEntry = availableEntries[0];
        let bestTempoDistance = Math.abs(targetTempo - bestEntry.tempo);

        for (let i = 1; i < availableEntries.length; i += 1) {
          const entry = availableEntries[i];
          const tempoDistance = Math.abs(targetTempo - entry.tempo);

          if (
            tempoDistance < bestTempoDistance ||
            (
              tempoDistance === bestTempoDistance &&
              Math.abs((targetTempo / entry.tempo) - 1) < Math.abs((targetTempo / bestEntry.tempo) - 1)
            ) ||
            (
              tempoDistance === bestTempoDistance &&
              Math.abs((targetTempo / entry.tempo) - 1) === Math.abs((targetTempo / bestEntry.tempo) - 1) &&
              entry.tempo < bestEntry.tempo
            )
          ) {
            bestEntry = entry;
            bestTempoDistance = tempoDistance;
          }
        }

        return bestEntry;
      }

      async function renderResampledBuffer(sourceBuffer, playbackRate) {
        if (!(sourceBuffer instanceof AudioBuffer)) {
          throw new Error('Missing source audio buffer.');
        }

        if (!isFinite(playbackRate) || playbackRate <= 0) {
          throw new Error('Invalid playback rate.');
        }

        const OfflineAudioContextClass = window.OfflineAudioContext || window.webkitOfflineAudioContext;
        if (!OfflineAudioContextClass) {
          throw new Error('Offline audio rendering is not supported in this browser.');
        }

        const sampleRate = sourceBuffer.sampleRate || 44100;
        const renderedDuration = sourceBuffer.duration / playbackRate;
        const frameCount = Math.max(1, Math.ceil(renderedDuration * sampleRate));

        const offlineCtx = new OfflineAudioContextClass(
          sourceBuffer.numberOfChannels,
          frameCount,
          sampleRate
        );

        const source = offlineCtx.createBufferSource();
        source.buffer = sourceBuffer;
        source.playbackRate.setValueAtTime(playbackRate, 0);
        source.connect(offlineCtx.destination);
        source.start(0);

        return await offlineCtx.startRendering();
      }

      async function getTrackBuffer(track) {
        if (track.file) {
          return await fetchAndDecodeBuffer(track.file, track.file);
        }

        const derivedCacheKey = 'derived:' + track.style + ':' + track.tempo;

        if (state.bufferCache.has(derivedCacheKey)) {
          return state.bufferCache.get(derivedCacheKey);
        }

        if (state.loadingMap.has(derivedCacheKey)) {
          return await state.loadingMap.get(derivedCacheKey);
        }

        const promise = (async () => {
          const sourceEntry = chooseBestSourceEntry(track.style, track.tempo);
          const sourceBuffer = await fetchAndDecodeBuffer(sourceEntry.file, sourceEntry.file);
          const playbackRate = track.tempo / sourceEntry.tempo;
          const renderedBuffer = await renderResampledBuffer(sourceBuffer, playbackRate);
          state.bufferCache.set(derivedCacheKey, renderedBuffer);
          return renderedBuffer;
        })();

        state.loadingMap.set(derivedCacheKey, promise);

        try {
          return await promise;
        } finally {
          state.loadingMap.delete(derivedCacheKey);
        }
      }

      function stopPendingCountIn() {
        if (state.pendingCountInTimeout) {
          window.clearTimeout(state.pendingCountInTimeout);
          state.pendingCountInTimeout = null;
        }

        if (state.countInSources && state.countInSources.length) {
          state.countInSources.forEach(function (source) {
            if (!source) {
              return;
            }

            try {
              source.stop();
            } catch (err) {
              // Ignore stop errors from already-ended sources.
            }

            try {
              source.disconnect();
            } catch (err) {
              // Ignore disconnect errors.
            }
          });
        }

        state.countInSources = [];
        state.pendingTrackId = null;

        if (state.pendingButton) {
          state.pendingButton.classList.remove('loading');
          state.pendingButton = null;
        }
      }

      async function getCountInClickBuffer() {
        return await fetchAndDecodeBuffer(COUNT_IN_CLICK_FILE, COUNT_IN_CLICK_FILE);
      }

      function scheduleCountInAndStart(track, button, audioBuffer, countInBuffer, countInBeats) {
        stopCurrentPlayback();

        const ctx = ensureAudioContext();
        const beatDuration = 60 / track.tempo;
        const startTime = ctx.currentTime + 0.05;
        const countInGain = 1.5;
        const beats = countInBeats === 8 ? 8 : 4;
        const trackStartTime = startTime + (beats * beatDuration);

        const source = ctx.createBufferSource();
        const sourceGain = ctx.createGain();
        const loopPoints = getLoopEndTime(track, audioBuffer);

        source.buffer = audioBuffer;
        source.loop = true;
        source.loopStart = loopPoints.loopStart;
        source.loopEnd = loopPoints.loopEnd;

        sourceGain.gain.setValueAtTime(1, ctx.currentTime);
        source.connect(sourceGain);
        sourceGain.connect(state.gainNode);
        source._sourceGain = sourceGain;

        state.pendingTrackId = track.id;
        state.pendingButton = button;
        state.countInSources = [];
        state.currentSource = source;
        state.currentTrackId = track.id;
        state.currentButton = button;

        button.classList.add('playing');
        button.classList.add('loading');
        button.setAttribute('aria-pressed', 'true');

        for (let i = 0; i < beats; i += 1) {
          const clickSource = ctx.createBufferSource();
          const clickGain = ctx.createGain();

          clickSource.buffer = countInBuffer;
          clickGain.gain.setValueAtTime(countInGain, ctx.currentTime);

          clickSource.connect(clickGain);
          clickGain.connect(state.gainNode);

          clickSource.onended = function () {
            try {
              clickSource.disconnect();
            } catch (err) {
              // Ignore disconnect errors.
            }

            try {
              clickGain.disconnect();
            } catch (err) {
              // Ignore disconnect errors.
            }
          };

          clickSource.start(startTime + (i * beatDuration));
          state.countInSources.push(clickSource);
        }

        source.start(trackStartTime, loopPoints.loopStart);

        function renderCountInStatus(activeIndex) {
          const parts = [];

          for (let i = 0; i < beats; i += 1) {
            const activeClass = i === activeIndex ? ' active' : '';
            parts.push('<span class="count-in-num' + activeClass + '">' + String(i + 1) + '</span>');
          }

          setStatus('<span class="count-in-wrap">Count-in: ' + parts.join(' ') + '</span>', true);
        }

        renderCountInStatus(0);

        for (let i = 1; i < beats; i += 1) {
          const beatTimer = window.setTimeout(function () {
            if (state.pendingTrackId !== track.id || state.currentSource !== source) {
              return;
            }
            renderCountInStatus(i);
          }, Math.max(0, Math.round((i * beatDuration * 1000) + 10)));

          state.countInSources.push({
            stop: function () {
              window.clearTimeout(beatTimer);
            },
            disconnect: function () {
              // No-op for timer cleanup compatibility.
            }
          });
        }

        state.pendingCountInTimeout = window.setTimeout(function () {
          state.pendingCountInTimeout = null;

          if (state.pendingTrackId !== track.id || state.currentSource !== source) {
            return;
          }

          state.pendingTrackId = null;
          state.countInSources = [];

          if (state.pendingButton) {
            state.pendingButton.classList.remove('loading');
            state.pendingButton = null;
          }

          startHumanizeModulation(source);
          setStatus('Playing ' + track.style + ' at ' + track.tempo + ' bpm');
        }, Math.ceil(((beats * beatDuration) + 0.12) * 1000));
      }

      function stopCurrentPlayback() {
        stopHumanizeModulation();
        stopPendingCountIn();

        if (state.currentSource) {
          const source = state.currentSource;
          const sourceGain = source._sourceGain || null;
          const ctx = ensureAudioContext();
          const fadeTime = 0.02;
          const stopTime = ctx.currentTime + fadeTime;

          state.currentSource = null;
          state.currentTrackId = null;

          if (state.currentButton) {
            state.currentButton.classList.remove('playing');
            state.currentButton.setAttribute('aria-pressed', 'false');
            state.currentButton = null;
          }

          try {
            source.onended = null;

            if (sourceGain) {
              sourceGain.gain.cancelScheduledValues(ctx.currentTime);
              sourceGain.gain.setValueAtTime(sourceGain.gain.value, ctx.currentTime);
              sourceGain.gain.linearRampToValueAtTime(0, stopTime);
            }

            source.stop(stopTime);

            window.setTimeout(function () {
              try {
                source.disconnect();
              } catch (err) {
                // Ignore disconnect errors.
              }

              if (sourceGain) {
                try {
                  sourceGain.disconnect();
                } catch (err) {
                  // Ignore disconnect errors.
                }
              }
            }, Math.ceil((fadeTime + 0.02) * 1000));
          } catch (err) {
            try {
              source.stop();
            } catch (stopErr) {
              // Ignore stop errors from already-stopped sources.
            }

            try {
              source.disconnect();
            } catch (disconnectErr) {
              // Ignore disconnect errors.
            }

            if (sourceGain) {
              try {
                sourceGain.disconnect();
              } catch (disconnectErr) {
                // Ignore disconnect errors.
              }
            }
          }

          return;
        }

        state.currentTrackId = null;

        if (state.currentButton) {
          state.currentButton.classList.remove('playing');
          state.currentButton.setAttribute('aria-pressed', 'false');
          state.currentButton = null;
        }
      }

      function startLoop(track, button, audioBuffer) {
        stopCurrentPlayback();

        const ctx = ensureAudioContext();
        const source = ctx.createBufferSource();
        const sourceGain = ctx.createGain();

        const { loopStart, loopEnd } = getLoopEndTime(track, audioBuffer);

        source.buffer = audioBuffer;
        source.loop = true;
        source.loopStart = loopStart;
        source.loopEnd = loopEnd;

        sourceGain.gain.setValueAtTime(1, ctx.currentTime);

        source.connect(sourceGain);
        sourceGain.connect(state.gainNode);

        source._sourceGain = sourceGain;

        source.start(0, loopStart);

        state.currentSource = source;
        state.currentTrackId = track.id;
        state.currentButton = button;

        button.classList.add('playing');
        button.setAttribute('aria-pressed', 'true');

        startHumanizeModulation(source);

        setStatus('Playing ' + track.style + ' at ' + track.tempo + ' bpm');
      }

      async function handleTrackButtonClick(track, button) {
        try {
          await resumeAudioContext();

          if (state.currentTrackId === track.id || state.pendingTrackId === track.id) {
            stopCurrentPlayback();
            setStatus('Stopped.');
            return;
          }

          const wasAlreadyPlaying = !!state.currentSource || !!state.pendingTrackId;
          const countInBeats = state.countInBeats === 4 || state.countInBeats === 8 ? state.countInBeats : 0;
          const shouldPlayCountIn = countInBeats > 0 && (!state.countInStoppedOnly || !wasAlreadyPlaying);

          button.classList.add('loading');
          setStatus('Loading ' + track.style + ' at ' + track.tempo + ' bpm...');

          const audioBufferPromise = getTrackBuffer(track);
          const countInBufferPromise = shouldPlayCountIn ? getCountInClickBuffer() : Promise.resolve(null);
          const results = await Promise.all([audioBufferPromise, countInBufferPromise]);
          const audioBuffer = results[0];
          const countInBuffer = results[1];

          if (shouldPlayCountIn && countInBuffer) {
            scheduleCountInAndStart(track, button, audioBuffer, countInBuffer, countInBeats);
            return;
          }

          button.classList.remove('loading');
          startLoop(track, button, audioBuffer);
        } catch (error) {
          button.classList.remove('loading');

          if (state.pendingButton === button) {
            state.pendingButton = null;
          }

          if (state.pendingTrackId === track.id) {
            state.pendingTrackId = null;
          }

          setStatus(error && error.message ? error.message : 'Unable to play sample.');
          console.error(error);
        }
      }

      function updateVolumeFromSlider() {
        const sliderValue = Number(els.volumeSlider.value) || 0;
        const gainValue = sliderValue / 100;
        state.volume = gainValue;
        els.volumeValue.textContent = sliderValue + '%';

        saveVolumePreference(gainValue);

        if (state.gainNode) {
          const ctx = ensureAudioContext();
          state.gainNode.gain.cancelScheduledValues(ctx.currentTime);
          state.gainNode.gain.setValueAtTime(state.gainNode.gain.value, ctx.currentTime);
          state.gainNode.gain.linearRampToValueAtTime(gainValue, ctx.currentTime + 0.03);
        }
      }

      function buildTrackGrid() {
        els.grid.innerHTML = '';
        const fragment = document.createDocumentFragment();

        Object.entries(TRACKS).forEach(([style, entries]) => {
          const visibleEntries = getVisibleEntriesForStyle(entries, state.tempoFilter);
          if (!visibleEntries.length) {
            return;
          }

          const card = document.createElement('section');
          card.className = 'card';

          const title = document.createElement('h2');
          title.textContent = style;
          card.appendChild(title);

          const buttonWrap = document.createElement('div');
          buttonWrap.className = 'buttons';

          visibleEntries.forEach((entry) => {
            const track = {
              id: getTrackId(style, entry.tempo),
              style,
              tempo: entry.tempo,
              file: entry.file,
              trimMs: entry.trimMs || 0
            };

            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'track-btn';
            button.setAttribute('aria-pressed', 'false');

            button.title = style + ' ' + entry.tempo + ' bpm';

            const tempo = document.createElement('span');
            tempo.className = 'tempo';
            tempo.textContent = entry.tempo + ' bpm';

            button.appendChild(tempo);
            button.addEventListener('click', function () {
              handleTrackButtonClick(track, button);
            });

            buttonWrap.appendChild(button);
          });

          card.appendChild(buttonWrap);
          fragment.appendChild(card);
        });

        els.grid.appendChild(fragment);
      }

      async function showSettingsModal() {
        const currentValue = state.tempoFilter || 'all';
        const currentHumanizeEnabled = state.humanizeEnabled === true;
        const currentHumanizeLevel = Math.max(0, Math.min(100, Math.round(state.humanizeLevel || 0)));
        const currentCountInBeats = state.countInBeats === 4 || state.countInBeats === 8 ? state.countInBeats : 0;
        const currentCountInStoppedOnly = state.countInStoppedOnly === true;

        return await new Promise(function (resolve) {
          const overlay = document.createElement('div');
          overlay.className = 'modal_compact_background';

          const modal = document.createElement('div');
          modal.className = 'modal_compact_main';

          const inner = document.createElement('div');
          inner.className = 'modal_compact_inner';

          const content = document.createElement('div');
          content.className = 'modal_compact_content';

          content.innerHTML = `
            <div>
              <h2 style="text-align:center;margin-top:0px;">Settings</h2>

              <div style="margin-top:12px;">
                <div style="font-weight:700;margin-bottom:10px;">Show:</div>

                <label style="display:block;margin:0 0 12px 0;">
                  <input type="radio" name="tempoFilterSetting" value="slow" ${currentValue === 'slow' ? 'checked' : ''}>
                  Slow tempos
                </label>

                <label style="display:block;margin:0 0 12px 0;">
                  <input type="radio" name="tempoFilterSetting" value="medium" ${currentValue === 'medium' ? 'checked' : ''}>
                  Medium tempos
                </label>

                <label style="display:block;margin:0 0 12px 0;">
                  <input type="radio" name="tempoFilterSetting" value="fast" ${currentValue === 'fast' ? 'checked' : ''}>
                  Fast tempos
                </label>

                <label style="display:block;margin:0 0 18px 0;">
                  <input type="radio" name="tempoFilterSetting" value="all" ${currentValue === 'all' ? 'checked' : ''}>
                  All tempos
                </label>
              </div>

              <hr style="margin:14px 0 16px 0;"/>

              <div>
                <label style="display:flex;align-items:center;gap:10px;font-weight:700;margin:0 0 14px 0;">
                  <input id="humanizeEnabled" type="checkbox" ${currentHumanizeEnabled ? 'checked' : ''}>
                  Humanize
                </label>

                <div style="display:flex;align-items:center;gap:12px;">
                  <label for="humanizeLevel" style="font-weight:700;white-space:nowrap;">Level</label>
                  <input id="humanizeLevel" type="range" min="0" max="100" step="1" value="${currentHumanizeLevel}" style="flex:1;" />
                  <div id="humanizeLevelValue" style="min-width:48px;text-align:left;font-weight:700;">${currentHumanizeLevel}%</div>
                </div>

                <div style="margin-top:10px;font-size:14px;line-height:1.4;color:#333;">
                  Adds tiny continuously changing speed variations for a less mechanical feel.
                </div>
              </div>

              <hr style="margin:14px 0 16px 0;"/>

              <div>
                <div style="font-weight:700;margin:0 0 12px 0;">Count-in clicks before starting:</div>

                <div class="count-in-pills">
                  <input type="radio" id="countIn0" name="countInBeatsSetting" value="0" ${currentCountInBeats === 0 ? 'checked' : ''}>
                  <label for="countIn0">0</label>

                  <input type="radio" id="countIn4" name="countInBeatsSetting" value="4" ${currentCountInBeats === 4 ? 'checked' : ''}>
                  <label for="countIn4">4</label>

                  <input type="radio" id="countIn8" name="countInBeatsSetting" value="8" ${currentCountInBeats === 8 ? 'checked' : ''}>
                  <label for="countIn8">8</label>
                </div>

                <label style="display:flex;align-items:center;gap:10px;font-weight:700;margin:8px 0 10px 0;">
                  <input id="countInStoppedOnly" type="checkbox" ${currentCountInStoppedOnly ? 'checked' : ''}>
                  Only count-in from stopped state
                </label>

                <div style="margin-top:10px;font-size:14px;line-height:1.4;color:#333;">
                  Choose 0, 4, or 8 count-in clicks before the backing track starts.<br/>The second option limits the count-in to only from a fully stopped state.
                </div>
              </div>
            </div>
          `;

          const buttons = document.createElement('div');
          buttons.className = 'modal_compact_buttons';

          const okButton = document.createElement('button');
          okButton.type = 'button';
          okButton.textContent = 'OK';

          buttons.appendChild(okButton);
          inner.appendChild(content);
          inner.appendChild(buttons);
          modal.appendChild(inner);
          overlay.appendChild(modal);
          document.body.appendChild(overlay);

          const humanizeEnabledEl = overlay.querySelector('#humanizeEnabled');
          const humanizeLevelEl = overlay.querySelector('#humanizeLevel');
          const humanizeLevelValueEl = overlay.querySelector('#humanizeLevelValue');
          const countInStoppedOnlyEl = overlay.querySelector('#countInStoppedOnly');

          function updateHumanizeControls() {
            const level = Math.max(0, Math.min(100, Number(humanizeLevelEl.value) || 0));
            humanizeLevelValueEl.textContent = level + '%';
            humanizeLevelEl.disabled = !humanizeEnabledEl.checked;
            humanizeLevelValueEl.style.opacity = humanizeEnabledEl.checked ? '1' : '0.55';
          }

          function cleanup(value) {
            document.removeEventListener('keydown', onKeyDown, true);
            overlay.remove();
            resolve(value);
          }

          function onKeyDown(event) {
            if (event.key === 'Escape') {
              event.preventDefault();
              cleanup(null);
            }
          }

          humanizeEnabledEl.addEventListener('change', updateHumanizeControls);
          humanizeLevelEl.addEventListener('input', updateHumanizeControls);
          updateHumanizeControls();

          okButton.addEventListener('click', function () {
            const selectedTempoFilter = overlay.querySelector('input[name="tempoFilterSetting"]:checked');
            const selectedCountInBeats = overlay.querySelector('input[name="countInBeatsSetting"]:checked');

            const tempoFilter = selectedTempoFilter ? selectedTempoFilter.value : currentValue;
            const humanizeEnabled = !!humanizeEnabledEl.checked;
            const humanizeLevel = Math.max(0, Math.min(100, Number(humanizeLevelEl.value) || 0));
            const countInBeatsRaw = selectedCountInBeats ? Number(selectedCountInBeats.value) : 0;
            const countInBeats = countInBeatsRaw === 4 || countInBeatsRaw === 8 ? countInBeatsRaw : 0;
            const countInStoppedOnly = !!countInStoppedOnlyEl.checked;

            cleanup({
              tempoFilter,
              humanizeEnabled,
              humanizeLevel,
              countInBeats,
              countInStoppedOnly
            });
          });

          overlay.addEventListener('click', function (event) {
            if (event.target === overlay) {
              cleanup(null);
            }
          });

          document.addEventListener('keydown', onKeyDown, true);

          const initiallyChecked = overlay.querySelector('input[name="tempoFilterSetting"]:checked');
          if (initiallyChecked) {
            initiallyChecked.focus();
          } else {
            okButton.focus();
          }
        });
      }

      async function openSettingsDialog() {
        const wasPlaying = !!state.currentSource;
        const previousStatus = wasPlaying ? 'Stopped.' : (els.status.textContent || 'Ready.');

        stopCurrentPlayback();
        setStatus('Opening settings.');

        const selectedSettings = await showSettingsModal();

        if (!selectedSettings) {
          setStatus(previousStatus);
          return;
        }

        const newTempoFilter = selectedSettings.tempoFilter;
        const newHumanizeEnabled = selectedSettings.humanizeEnabled === true;
        const newHumanizeLevel = Math.max(0, Math.min(100, Math.round(selectedSettings.humanizeLevel || 0)));
        const newCountInBeats = selectedSettings.countInBeats === 4 || selectedSettings.countInBeats === 8
          ? selectedSettings.countInBeats
          : 0;
        const newCountInStoppedOnly = selectedSettings.countInStoppedOnly === true;

        let didChangeSettings = false;

        if (newTempoFilter !== state.tempoFilter) {
          state.tempoFilter = newTempoFilter;
          saveTempoFilterPreference(newTempoFilter);
          didChangeSettings = true;
        }

        if (newHumanizeEnabled !== state.humanizeEnabled || newHumanizeLevel !== state.humanizeLevel) {
          state.humanizeEnabled = newHumanizeEnabled;
          state.humanizeLevel = newHumanizeLevel;
          saveHumanizePreferences(newHumanizeEnabled, newHumanizeLevel);
          didChangeSettings = true;
        }

        if (newCountInBeats !== state.countInBeats || newCountInStoppedOnly !== state.countInStoppedOnly) {
          state.countInBeats = newCountInBeats;
          state.countInStoppedOnly = newCountInStoppedOnly;
          saveCountInPreferences(newCountInBeats, newCountInStoppedOnly);
          didChangeSettings = true;
        }

        if (didChangeSettings) {
          buildTrackGrid();
        }

        setStatus(
          'Ready.'
        );
      }

      async function showInstructionsModal() {
        const html = `
          <div class="modal_instructions_content">
            <div>
              <h2 style="text-align:center;margin-top:0px;">Instructions</h2>

              <p class="instructions-title">
                <strong>The Thumpatron</strong> is a simple bodhrán backing track player for tune practice.
              </p>

              <p class="instructions-title">
                It lets you play looping backing tracks for <strong>Reels</strong>, <strong>Jigs</strong>, and <strong>Polkas</strong>
                at a range of tempos.
              </p>

              <h4>1) Choose a backing track</h4>
              <ul>
                <li>Click any tempo button in the <strong>Reel</strong>, <strong>Jig</strong>, or <strong>Polka</strong> section to start playback.</li>
                <li>Only one backing track plays at a time.</li>
                <li>Clicking a different tempo button stops the currently playing track and starts the newly selected one.</li>
                <li>Clicking the currently playing button stops playback.</li>
                <li>Some tempos are generated from nearby recordings and may take a moment to load the first time.</li>
              </ul>

              <h4>2) Settings</h4>
              <ul>
                <li>Click the settings button (<strong>☰</strong>) at the upper left to open the settings dialog.</li>
                <li>You can choose <strong>Slow tempos</strong>, <strong>Medium tempos</strong>, <strong>Fast tempos</strong>, or <strong>All tempos</strong> to control which tempo buttons are displayed.</li>
                <li>The <strong>Humanize</strong> option adds tiny constantly changing speed variations for a less mechanical feel.</li>
                <li>Use the <strong>Humanize Level</strong> slider to control how strong the effect is. Higher values create more noticeable speed drift.</li>
                <li>The <strong>Count-in clicks before starting:</strong> options play 0, 4, or 8 clicks before the track starts.</li>
                <li><strong>Only count-in from stopped state</strong> limits the count-in so it is skipped when switching directly from one playing track to another.</li>
                <li>Your tempo display, humanize, count-in, and volume settings are saved and restored the next time you open the tool.</li>
              </ul>

              <h4>3) Adjust the volume</h4>
              <ul>
                <li>Use the <strong>Volume</strong> slider at the top of the tool to control playback level.</li>
                <li>Your volume setting is remembered the next time you open the tool.</li>
              </ul>

              <h4>4) Stop playback</h4>
              <ul>
                <li>Click <strong>Stop All Play</strong> to stop any currently playing backing track.</li>
              </ul>

              <h4>5) Looping behavior</h4>
              <ul>
                <li>The backing tracks are configured to loop continuously for practice.</li>
              </ul>

              <h4>6) Mobile and tablet use</h4>
              <ul>
                <li>On iOS devices, make sure the device is <strong>not muted</strong>. If sound is not heard, check that the <strong>mute switch</strong> on the device is off and that <strong>Silent Mode</strong> is also off in <strong>Control Center</strong>.</li>
                <li>If playback does not start on mobile, tap a track button directly to allow the browser to activate audio.</li>
              </ul>

              <hr>

              <h4 style="text-align: center;">Tip Jars</h4>
              <div style="text-align: center;margin-bottom:20px;">
                <p class="instructions-title">This tool was created by</p>
                <p class="instructions-title"> <a style="color:#1a73e8; text-decoration:underline;" href="https://michaeleskin.com" target="_blank" rel="noopener noreferrer">Michael Eskin</a></p>
                <div style="margin-top:10px;">
                  If the tool has been useful to you, please consider supporting ongoing<br/>development by tossing a few bucks into one of my online tip jars.
                </div>
                <div style="margin-top:10px;">
                  <b>PayPal</b><br/>
                  <a href="https://paypal.me/MichaelEskin" target="_blank" rel="noopener noreferrer" style="color:#1a73e8; text-decoration:underline;">https://paypal.me/MichaelEskin</a>
                </div>
                <div style="margin-top:10px;">
                  <b>Venmo</b><br/>
                  @MichaelEskin
                </div>
              </div>

              <hr>

              <div style="text-align: center;margin-bottom:20px;">
                <h4>Original Backing Tracks Source</h4>
                <p class="instructions-title">The bodhrán backing tracks used in the tool are derived from a set originally created by</p>
                <p class="instructions-title"><a style="color:#1a73e8; text-decoration:underline;" href="https://santigaitero.com" target="_blank" rel="noopener noreferrer">Santiago Molina</a>.</p>
              </div>

              <hr>
              
              <h4 style="text-align: center;">Source Code on GitHub</h4>
              <div style="text-align: center;margin-bottom:20px;">
                The source code for this tool is available on GitHub<br/>
                <div style="margin-top:10px;">
                  <a href="https://github.com/seisiuneer/abctools/blob/main/tools/thumpatron.html" target="_blank" rel="noopener noreferrer" style="color:#1a73e8; text-decoration:underline;">thumpatron.html on GitHub</a>
                </div>
              </div>

              <hr>

            </div>
          </div>
        `;

        if (window.DayPilot && DayPilot.Modal && typeof DayPilot.Modal.alert === 'function') {
          await DayPilot.Modal.alert(html, {
            theme: 'modal_instructions',
            scrollWithPage: false,
            okText: 'Close'
          });
          return;
        }

        alert(
          'The Thumpatron\\n\\n' +
          'Click a tempo button in the Reel, Jig, or Polka section to start a looping bodhrán backing track. ' +
          'Use the Volume slider to adjust the level, and click Stop All Play to stop playback. ' +
          'On iOS devices, make sure the mute switch and Silent Mode in Control Center are turned off if you do not hear sound.'
        );
      }

      function bindEvents() {
        els.volumeSlider.addEventListener('input', updateVolumeFromSlider);
        els.stopAllBtn.addEventListener('click', function () {
          stopCurrentPlayback();
          setStatus('Stopped.');
        });

        if (els.instructionsBtn) {
          els.instructionsBtn.addEventListener('click', showInstructionsModal);
        }

        if (els.settingsBtn) {
          els.settingsBtn.addEventListener('click', openSettingsDialog);
        }

        document.addEventListener('visibilitychange', function () {
          if (document.hidden && state.audioCtx && state.audioCtx.state === 'running') {
            // Intentionally do nothing so playback continues.
          }
        });
      }

      function init() {
        state.tempoFilter = loadTempoFilterPreference();
        state.humanizeEnabled = loadHumanizeEnabledPreference();
        state.humanizeLevel = loadHumanizeLevelPreference();
        state.countInBeats = loadCountInBeatsPreference();
        state.countInStoppedOnly = loadCountInStoppedOnlyPreference();
        state.volume = loadVolumePreference();

        els.volumeSlider.value = String(Math.round(state.volume * 100));

        buildTrackGrid();
        bindEvents();
        updateVolumeFromSlider();
      }

      init();
    })();
  </script>
