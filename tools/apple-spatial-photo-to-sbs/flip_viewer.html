 <!doctype html>
<html lang="en">

<style>
  :root {
    color-scheme: dark;
    --panel: #161d27;
    --panel2: #202a36;
    --text: #f2f6fb;
    --muted: #aab7c6;
    --accent: #73d0ff;

    --border: rgba(255,255,255,.14);

  }

  }

  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #000;
    color: var(--text);
    min-height: 100vh;

  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;

    background-color: #000;
    background-image: url("https://michaeleskin.com/tools/img/spatial_to_sbs_background.jpg");
    background-repeat: repeat;

    background-size: 320px 320px;

    opacity: 0.15;
  }

  .wrap {
    width: min(960px, calc(100vw - 28px));
    margin: 0 auto;
    padding: 18px 0 40px;
  }

  header,
  .card {
    background:
      linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)),
      var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 16px;
  }

  header {
    text-align: center;
  }

  h1 {
    margin: 0 0 8px;
    font-size: clamp(1.45rem, 3vw, 2rem);
    letter-spacing: .01em;
    text-shadow: 0 0 18px rgba(115,208,255,.35);
  }

  .subhead {
    margin: 0 auto;
    max-width: 760px;
    color: var(--muted);
    line-height: 1.45;
  }

  label {
    display: block;
    font-weight: 650;
    margin-bottom: 8px;
  }

  input[type="file"],
  button {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 12px;
    background: var(--panel2);
    color: var(--text);
    font: inherit;
  }

  input[type="file"]::file-selector-button {
    appearance: none;
    -webkit-appearance: none;
    margin-right: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    background: linear-gradient(180deg, rgba(115,208,255,.22), rgba(115,208,255,.10)), var(--panel2);
    color: var(--text);
    font: inherit;
    font-weight: 650;
  }

  input[type="file"]::-webkit-file-upload-button {
    -webkit-appearance: none;
    margin-right: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    background: linear-gradient(180deg, rgba(115,208,255,.22), rgba(115,208,255,.10)), var(--panel2);
    color: var(--text);
    font: inherit;
    font-weight: 650;
  }

  button {
    cursor: pointer;
    font-weight: 750;
    background: linear-gradient(180deg, rgba(115,208,255,.26), rgba(115,208,255,.12)), var(--panel2);
  }

  .row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: nowrap;
  }

  input[type="range"] {
    flex: 1 1 auto;
    min-width: 0;
  }

  .rangeValue {
    min-width: 5.5rem;
    padding: 8px 10px;
    border-radius: 10px;

    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .hint {
    color: var(--muted);
    font-size: .93rem;
    line-height: 1.4;
    margin-top: 8px;
  }

  .viewerBox {
    --viewer-aspect: 1.333333;
    --viewer-max-height: min(720px, calc(100dvh - 360px));

    background: rgba(0,0,0,.35);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;

    width: min(100%, calc(var(--viewer-max-height) * var(--viewer-aspect)));
    aspect-ratio: var(--viewer-aspect);
    margin-left: auto;
    margin-right: auto;

    display: grid;
    place-items: center;
    position: relative;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  #emptyMessage {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 20px;
  }

  select {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 9px 34px 9px 10px;
    background-color: var(--panel2);
    color: var(--text);
    font: inherit;
    appearance: none;
    -webkit-appearance: none;
    background-image:
      linear-gradient(45deg, transparent 50%, var(--muted) 50%),
      linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position:
      calc(100% - 20px) 50%,
      calc(100% - 14px) 50%;
    background-size:
      6px 6px,
      6px 6px;
    background-repeat: no-repeat;
  }

  select:disabled,
  input:disabled,
  button:disabled {
    opacity: .55;
    cursor: not-allowed;
  }

  .viewerControlsGrid {
    margin-top: 14px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    align-items: start;
  }

  .flipControls {
    min-width: 0;
    width: 100%;
  }

  .displayControls {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    min-width: 0;
    width: 100%;
  }

  .displayControl {
    min-width: 0;
  }

  .displayControl label {
    font-size: .88rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .controlHeaderActions {
    display: flex;
    align-items: center;

    flex: 0 0 auto;

  button.smallPauseButton {
    width: auto;

    border-radius: 10px;
    font-size: .88rem;
    line-height: 1.15;
    white-space: nowrap;
  }

  .meta {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));

    margin-top: 18px;
    color: var(--muted);
    font-size: .93rem;

  .pill {
    padding: 8px 10px;

    background: rgba(255,255,255,.07);

  .modal_instructions_inner {

  .modal_instructions_content {

<body>
<div class="wrap">

  <header>
    <h1>Side-by-Side Stereo Flip Viewer</h1>
    <p class="subhead">
      Open a left/right side-by-side JPEG and view it as a flip stereo image.
    </p>
  </header>

  <section class="card">
    <div>
      <label for="fileInput">Side-by-Side JPEG Image:</label>
      <input id="fileInput" type="file" accept="image/jpeg">
    </div>
  </section>

  <section class="card">
    <div class="viewerBox" id="viewerBox">
      <canvas id="viewerCanvas"></canvas>
      <div id="emptyMessage" class="hint">Stereo flip viewer output will appear here.</div>
    </div>
    <div class="viewerControlsGrid">
      <div class="flipControls">
        <div class="controlHeader">
          <label for="speedRange">Flip Speed</label>
          <div class="controlHeaderActions">
            <button id="playPauseButton" class="smallPauseButton" type="button">Pause</button>
            <span id="speedValue" class="rangeValue">1.2 Hz</span>
          </div>
        </div>
        <div class="row">
          <input id="speedRange" type="range" min="0.1" max="5" step="0.1" value="1.2">
        </div>
      </div>

      <div class="displayControls">
        <div class="displayControl">
          <label for="displayMode">Display Mode</label>
          <select id="displayMode" title="Choose whether to view the image as an animated stereo flip or as the original full side-by-side JPEG.">
            <option value="flip">Flip Stereo View</option>
            <option value="full">Original Side-by-Side Image</option>
          </select>
        </div>

        <div class="displayControl" id="imageOrderControl">
          <label for="fullImageOrder">Image Order</label>
          <select id="fullImageOrder" title="Choose the left/right order when displaying the original full side-by-side image. This is only available in Original Side-by-Side Image mode.">
            <option value="normal">Original</option>
            <option value="reverse">Swapped</option>
          </select>
        </div>
      </div>
    </div>

    <div class="meta">
      <div id="fileMeta" class="pill">No file selected.</div>
      <div id="sourceMeta" class="pill">No image loaded.</div>
    </div>
  </section>

  <div class="card instructionsActions">
    <button id="showInstructionsButton" type="button" title="Open instructions for using the Side-by-Side Stereo Flip Viewer.">Instructions</button>
  </div>

</div>

<script type="text/javascript" src="daypilot-modal.min-3.10.1.js"></script>
<script>
(() => {
  "use strict";

  const fileInput = document.getElementById("fileInput");
  const speedRange = document.getElementById("speedRange");
  const speedValue = document.getElementById("speedValue");
  const playPauseButton = document.getElementById("playPauseButton");
  const displayMode = document.getElementById("displayMode");
  const fullImageOrder = document.getElementById("fullImageOrder");
  const imageOrderControl = document.getElementById("imageOrderControl");
  const canvas = document.getElementById("viewerCanvas");
  const ctx = canvas.getContext("2d", { alpha: false });
  const emptyMessage = document.getElementById("emptyMessage");
  const viewerBox = document.getElementById("viewerBox");
  const fileMeta = document.getElementById("fileMeta");
  const sourceMeta = document.getElementById("sourceMeta");
  const showInstructionsButton = document.getElementById("showInstructionsButton");

  let leftCanvas = null;
  let rightCanvas = null;
  let sourceFullCanvas = null;
  let playing = true;
  let animationStart = performance.now();
  let lastFrameRequest = 0;


  function showInstructions() {
    const html = `
      <div class="instructions-body">
        <h3 style="text-align:center;">Side-by-Side Stereo Flip Viewer</h3>

        <p>
          This viewer opens a side-by-side JPEG image and rapidly alternates between the left-eye and right-eye views.
          The effect is often called a <b>flip</b> or <b>wiggle</b> stereo view.
        </p>

        <div style="text-align: center;margin-bottom:20px;">
          This tool can be used to view the side-by-side JPEG images created with my<br/>
           <div style="margin-top:10px;">
            <a href="https://michaeleskin.com/tools/apple-spatial-photo-to-sbs.html" target="_blank" rel="noopener noreferrer">Apple Spatial Photo → Side-by-Side or 3D Anaglyph JPEG Tool</a>
          </div>
        </div>

        <h4>Opening an image</h4>
        <ul>
          <li>Click <b>Side-by-Side JPEG Image</b> and choose a JPEG file.</li>
          <li>You can also drag a JPEG directly onto the preview area.</li>
          <li>The image should contain the two stereo views side by side in a single JPEG.</li>
        </ul>

        <h4>Display modes</h4>
        <ul>
          <li><b>Flip Stereo View</b> alternates between the left-eye and right-eye views.</li>
          <li><b>Original Side-by-Side Image</b> shows the full side-by-side JPEG without flipping.</li>
          <li>When viewing the original side-by-side image, use <b>Image Order</b> to switch between Original and Swapped display.</li>
          <li>The Image Order control is hidden in Flip Stereo View mode.</li>
        </ul>

        <h4>Image layout</h4>
        <ul>
          <li>The viewer assumes the left half of the JPEG is one eye view and the right half is the other eye view.</li>
          <li>Images exported from the Apple Spatial Photo to Side-by-Side tool are already in the expected format.</li>
          <li>The preview area is fixed at a comfortable 4:3 shape and the image is scaled to fit inside it.</li>
        </ul>

        <h4>Flip Speed</h4>
        <ul>
          <li>Use <b>Flip Speed</b> to control how quickly the viewer alternates between the two eye views.</li>
          <li>Slower speeds can be easier for inspecting alignment.</li>
          <li>Faster speeds can make the stereo depth effect feel more immediate.</li>
        </ul>

        <h4>Pause / Play</h4>
        <ul>
          <li>Click <b>Pause</b> to stop the animation on the left-eye view.</li>
          <li>Click <b>Play</b> to resume flipping between the two views.</li>
        </ul>

        <h4>Notes</h4>
        <ul>
          <li>This viewer does not create a new image file; it is only for viewing and checking side-by-side stereo images.</li>
          <li>The flip effect is a visual approximation of stereo depth. It is not the same as a true stereoscope, VR viewer, or lenticular display.</li>
        </ul>

        <h4>Privacy</h4>
        <ul>
          <li>All processing is performed locally in your browser.</li>
          <li>The selected JPEG file is not uploaded to a server by this tool.</li>
          <li>Google Analytics is used to collect aggregate usage statistics for the tool.</li>
        </ul>

        <hr style="margin-top:20px;">

        <h4 style="text-align: center;">Tip Jars</h4>
        <div style="text-align: center;margin-bottom:20px;">
          <p class="instructions-title"> This tool was created by</p>
          <p class="instructions-title"> <a href="https://michaeleskin.com" target="_blank" rel="noopener noreferrer" style="color:#1a73e8; text-decoration:underline;">Michael Eskin</a></p>
          <div style="margin-top:10px;">
            If the tool has been useful to you, please consider supporting ongoing<br/>development by tossing a few bucks into one of my online tip jars.
          </div>
          <div style="margin-top:10px;">
            <b>PayPal</b><br/>
            <a href="https://paypal.me/MichaelEskin" target="_blank" rel="noopener noreferrer" style="color:#1a73e8; text-decoration:underline;">https://paypal.me/MichaelEskin</a>
          </div>
          <div style="margin-top:10px;">
            <b>Venmo</b><br/>
            @MichaelEskin
          </div>
        </div>

        <hr>

        <h4 style="text-align: center;">Source Code on GitHub</h4>
        <div style="text-align: center;margin-bottom:20px;">
          The source code for this tool is available on GitHub<br/>
           <div style="margin-top:10px;">
            <a href="https://github.com/seisiuneer/abctools/tree/main/tools/apple-spatial-photo-to-sbs" target="_blank" rel="noopener noreferrer">Side-by-Side Stereo Flip Viewer on GitHub</a>
          </div>
        </div>

        <hr>
      </div>
    `;

    if (window.DayPilot && DayPilot.Modal && typeof DayPilot.Modal.alert === "function") {
      DayPilot.Modal.alert(html, {
        theme: "modal_instructions",
        top: 80
      });
      return;
    }

    alert(
      "Side-by-Side Stereo Flip Viewer\\n\\n" +
      "Open a side-by-side JPEG image and use Flip Speed to control how quickly the viewer alternates between the two eye views. " +
      "Click Pause to stop the animation and Play to resume."
    );
  }

  function formatBytes(bytes) {
    const units = ["B", "KB", "MB", "GB"];
    let value = bytes;
    let unit = 0;

    while (value >= 1024 && unit < units.length - 1) {
      value /= 1024;
      unit++;
    }

    return `${value.toFixed(unit ? 1 : 0)} ${units[unit]}`;
  }

  function updateControlLabels() {
    const fullImageMode = displayMode.value === "full";

    speedValue.textContent = `${Number(speedRange.value).toFixed(1)} Hz`;

    speedRange.disabled = fullImageMode;
    playPauseButton.disabled = fullImageMode;
    fullImageOrder.disabled = !fullImageMode;

    if (imageOrderControl) {
      imageOrderControl.style.display = fullImageMode ? "" : "none";
    }
  }

  function splitSideBySideImage(img) {
    const eyeWidth = Math.floor(img.naturalWidth / 2);
    const eyeHeight = img.naturalHeight;

    if (eyeWidth < 1 || eyeHeight < 1) {
      throw new Error("Image is too small.");
    }

    const l = document.createElement("canvas");
    const r = document.createElement("canvas");

    l.width = eyeWidth;
    l.height = eyeHeight;
    r.width = eyeWidth;
    r.height = eyeHeight;

    const lctx = l.getContext("2d", { alpha: false });
    const rctx = r.getContext("2d", { alpha: false });

    lctx.drawImage(img, 0, 0, eyeWidth, eyeHeight, 0, 0, eyeWidth, eyeHeight);
    rctx.drawImage(img, eyeWidth, 0, eyeWidth, eyeHeight, 0, 0, eyeWidth, eyeHeight);

    const full = document.createElement("canvas");
    full.width = img.naturalWidth;
    full.height = img.naturalHeight;

    const fullCtx = full.getContext("2d", { alpha: false });
    fullCtx.drawImage(img, 0, 0);

    leftCanvas = l;
    rightCanvas = r;
    sourceFullCanvas = full;
  }

  function resizeCanvasToViewer() {
    const rect = viewerBox.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const w = Math.max(1, Math.round(rect.width * dpr));
    const h = Math.max(1, Math.round(rect.height * dpr));

    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
    }
  }

  function clearCanvas() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function getContainRect(imageWidth, imageHeight, destinationWidth, destinationHeight) {
    const scale = Math.min(destinationWidth / imageWidth, destinationHeight / imageHeight);

    const w = imageWidth * scale;
    const h = imageHeight * scale;
    const x = (destinationWidth - w) / 2;
    const y = (destinationHeight - h) / 2;

    return { x, y, w, h };
  }

  function getFlipSide(now) {
    if (!playing) {
      return "left";
    }

    const hz = Number(speedRange.value);
    const elapsed = (now - animationStart) / 1000;
    const cycle = (elapsed * hz) % 1;

    return cycle >= 0.5 ? "right" : "left";
  }

  function drawEyeImage(img, rect) {
    ctx.drawImage(img, rect.x, rect.y, rect.w, rect.h);
  }

  function drawFullSideBySideImage() {
    if (!sourceFullCanvas || !leftCanvas || !rightCanvas) {
      return false;
    }

    const reverse = fullImageOrder.value === "reverse";

    if (!reverse) {
      const rect = getContainRect(sourceFullCanvas.width, sourceFullCanvas.height, canvas.width, canvas.height);
      ctx.drawImage(sourceFullCanvas, rect.x, rect.y, rect.w, rect.h);
      return true;
    }

    const combinedWidth = leftCanvas.width + rightCanvas.width;
    const combinedHeight = leftCanvas.height;
    const rect = getContainRect(combinedWidth, combinedHeight, canvas.width, canvas.height);
    const eyeWidth = rect.w / 2;

    ctx.drawImage(rightCanvas, rect.x, rect.y, eyeWidth, rect.h);
    ctx.drawImage(leftCanvas, rect.x + eyeWidth, rect.y, eyeWidth, rect.h);

    return true;
  }

  function render(now = performance.now()) {
    resizeCanvasToViewer();
    clearCanvas();
    updateControlLabels();

    if (!leftCanvas || !rightCanvas) {
      lastFrameRequest = requestAnimationFrame(render);
      return;
    }

    emptyMessage.style.display = "none";

    if (displayMode.value === "full") {
      drawFullSideBySideImage();
      lastFrameRequest = requestAnimationFrame(render);
      return;
    }

    const side = getFlipSide(now);
    const eyeImage = side === "right" ? rightCanvas : leftCanvas;
    const rect = getContainRect(eyeImage.width, eyeImage.height, canvas.width, canvas.height);

    drawEyeImage(eyeImage, rect);

    lastFrameRequest = requestAnimationFrame(render);
  }

  function requestRender() {
    cancelAnimationFrame(lastFrameRequest);
    lastFrameRequest = requestAnimationFrame(render);
  }


  function isJpegFile(file) {
    return !!file &&
      (
        /^image\/jpe?g$/i.test(file.type || "") ||
        /\.jpe?g$/i.test(file.name || "")
      );
  }

  async function loadImageFile(file) {
    if (!file) return;

    if (!isJpegFile(file)) {
      leftCanvas = null;
      rightCanvas = null;
      sourceFullCanvas = null;
      emptyMessage.style.display = "grid";
      fileMeta.textContent = file?.name ? `${file.name} (${formatBytes(file.size)})` : "No file selected.";
      sourceMeta.textContent = "Please choose a JPEG side-by-side image.";
      requestRender();
      return;
    }

    const url = URL.createObjectURL(file);

    try {
      const img = new Image();
      img.decoding = "async";

      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = () => reject(new Error("Could not load image."));
        img.src = url;
      });

      splitSideBySideImage(img);

      const eyeWidth = Math.floor(img.naturalWidth / 2);
      const eyeHeight = img.naturalHeight;

      // Keep the viewer fixed at 4:3 / 1.333333.
      viewerBox.style.height = "auto";

      fileMeta.textContent = `${file.name} (${formatBytes(file.size)})`;
      sourceMeta.textContent = `Source: ${img.naturalWidth} × ${img.naturalHeight}; each eye: ${eyeWidth} × ${eyeHeight}`;

      animationStart = performance.now();
      requestRender();
    } catch (err) {
      fileMeta.textContent = `${file.name} (${formatBytes(file.size)})`;
      sourceMeta.textContent = "Could not load image.";
    } finally {
      URL.revokeObjectURL(url);
    }
  }


  if (showInstructionsButton) {
    showInstructionsButton.addEventListener("click", showInstructions);
  }

  fileInput.addEventListener("change", () => {
    const file = fileInput.files && fileInput.files[0];
    loadImageFile(file);
  });

  displayMode.addEventListener("change", () => {
    updateControlLabels();
    requestRender();
  });

  fullImageOrder.addEventListener("change", () => {
    requestRender();
  });

  speedRange.addEventListener("input", () => {
    updateControlLabels();
    requestRender();
  });

  speedRange.addEventListener("change", () => {
    updateControlLabels();
    requestRender();
  });

  playPauseButton.addEventListener("click", () => {
    if (displayMode.value === "full") {
      return;
    }

    playing = !playing;
    playPauseButton.textContent = playing ? "Pause" : "Play";

    if (playing) {
      animationStart = performance.now();
    }

    requestRender();
  });

  window.addEventListener("resize", requestRender);

  viewerBox.addEventListener("dragover", event => {
    event.preventDefault();
    viewerBox.style.borderColor = "var(--accent)";
  });

  viewerBox.addEventListener("dragleave", () => {
    viewerBox.style.borderColor = "var(--border)";
  });

  viewerBox.addEventListener("drop", event => {
    event.preventDefault();
    viewerBox.style.borderColor = "var(--border)";

    const file = event.dataTransfer?.files?.[0];
    if (file) {
      loadImageFile(file);
    }
  });

  updateControlLabels();
  requestRender();
})();
</script>
</body>
</html>
